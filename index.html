<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার IPTV প্লেয়ার</title>
    <!-- Video.js CSS লাইভ স্ট্রিম প্লে করার জন্য -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #11141a;
            color: #ffffff;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            color: #00ff88;
            font-size: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* প্লেয়ার সেকশন */
        .player-section {
            background-color: #1a1f29;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-container {
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        .video-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }

        .current-channel-info {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ff88;
        }

        /* চ্যানেল লিস্ট সেকশন */
        .channel-section {
            background-color: #1a1f29;
            padding: 20px;
            border-radius: 12px;
        }

        .channel-section h2 {
            margin-bottom: 15px;
            font-size: 1.4rem;
            border-left: 4px solid #00ff88;
            padding-left: 10px;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* স্ক্রোলবার কাস্টমাইজেশন */
        .channel-grid::-webkit-scrollbar {
            width: 6px;
        }
        .channel-grid::-webkit-scrollbar-thumb {
            background-color: #333d4f;
            border-radius: 4px;
        }

        /* চ্যানেল কার্ড স্টাইল */
        .channel-card {
            background-color: #252d3d;
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .channel-card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
            background-color: #2c374b;
        }

        .channel-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: #00ff88;
            color: #11141a;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .channel-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin: 10px auto;
            display: block;
            background-color: #fff;
            border-radius: 8px;
            padding: 5px;
        }

        .channel-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* রেসপনসিভ লেআউট (ডেস্কটপ স্ক্রিনের জন্য সাইড-বাই-সাইড) */
        @media (min-width: 850px) {
            .container {
                grid-template-columns: 65% 35%;
                align-items: start;
            }
            .channel-grid {
                max-height: 65vh;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>লাইভ IPTV প্লেয়ার</h1>
    </header>

    <div class="container">
        
        <!-- প্লেয়ার উইন্ডো -->
        <div class="player-section">
            <div class="video-container">
                <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
                    <p class="vjs-no-js">
                        ভিডিও দেখতে আপনার ব্রাউজারে জাভাস্ক্রিপ্ট সচল করুন।
                    </p>
                </video>
            </div>
            <div class="current-channel-info" id="playing-now">
                এখন প্লে হচ্ছে: কোনো চ্যানেল সিলেক্ট করা নেই
            </div>
        </div>

        <!-- চ্যানেল লিস্ট গ্রিড -->
        <div class="channel-section">
            <h2>চ্যানেল সমূহ</h2>
            <div class="channel-grid" id="channel-list">
                <!-- জাভাস্ক্রিপ্ট দিয়ে এখানে চ্যানেলগুলো লোড হবে -->
            </div>
        </div>

    </div>

    <!-- Video.js এবং HLS প্লাগইন (লাইভ স্ট্রিম খেলার জন্য) -->
    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    
    <script>
        // এখানে আপনার চ্যানেলগুলোর নম্বর, নাম, লোগো এবং .m3u8 বা লাইভ লিংক বসান
        const channels = [
            {
                number: "01",
                name: "Somoy TV",
                logo: "https://images.prothomalo.com/prothomalo-bangla/2021-02/ca5fa699-f2e7-49f3-8b7c-d64e9e04892c/Somoy_TV.jpg",
                link: "https://your-stream-link-here.com/live/somoy.m3u8" // আপনার আসল m3u8 লিংক দিন
            },
            {
                number: "02",
                name: "Jamuna TV",
                logo: "https://www.jamuna.tv/wp-content/uploads/2023/11/jtv-logo.png",
                link: "https://your-stream-link-here.com/live/jamuna.m3u8"
            },
            {
                number: "03",
                name: "Sony Sports 1",
                logo: "https://upload.wikimedia.org/wikipedia/commons/e/e0/Sony_Sports_Network_logo.png",
                link: "https://your-stream-link-here.com/live/sonysports.m3u8"
            }
            // এভাবে আপনি আরও যত খুশি চ্যানেল নিচে অবজেক্ট তৈরি করে যোগ করতে পারবেন
        ];

        // Video.js প্লেয়ার ইনিশিয়ালাইজ করা
        const player = videojs('my-video', {
            fluid: true,
            autoplay: false,
            controls: true
        });

        const channelListContainer = document.getElementById('channel-list');
        const playingNowText = document.getElementById('playing-now');

        // চ্যানেলগুলো স্ক্রিনে রেন্ডার করার ফাংশন
        function loadChannels() {
            channels.forEach((channel) => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                
                card.innerHTML = `
                    <span class="channel-number">${channel.number}</span>
                    <img class="channel-logo" src="${channel.logo}" alt="${channel.name} Logo" onerror="this.src='https://via.placeholder.com/70?text=No+Logo'">
                    <div class="channel-name">${channel.name}</div>
                `;

                // কার্ডে ক্লিক করলে চ্যানেল প্লে হবে
                card.addEventListener('click', () => {
                    playChannel(channel);
                });

                channelListContainer.appendChild(card);
            });
        }

        // চ্যানেল প্লে করার ফাংশন
        function playChannel(channel) {
            playingNowText.innerText = `এখন প্লে হচ্ছে: [${channel.number}] ${channel.name}`;
            
            player.src({
                src: channel.link,
                type: 'application/x-mpegURL' // HLS বা m3u8 স্ট্রিমের জন্য এই টাইপ জরুরি
            });
            
            player.play();
            
            // মোবাইল স্ক্রিনে ক্লিক করার পর যাতে স্ক্রোল করে প্লেয়ারের কাছে চলে যায়
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // প্রথমবার পেজ লোড হলে চ্যানেল লিস্ট দেখাবে
        loadChannels();
        
        // ডিফল্টভাবে প্রথম চ্যানেলটি সেট করে রাখা (প্লে হবে না, জাস্ট রেডি থাকবে)
        if(channels.length > 0) {
            player.src({
                src: channels[0].link,
                type: 'application/x-mpegURL'
            });
            playingNowText.innerText = `চ্যানেল সিলেক্ট করুন (প্রথম চ্যানেল রেডি আছে: ${channels[0].name})`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live IPTV Player Pro</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #0b0f19;
            --sidebar-bg: #111827;
            --card-bg: #1f2937;
            --accent-color: #2563eb;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header */
        header {
            background-color: var(--sidebar-bg);
            padding: 12px 20px;
            border-bottom: 1px solid #374151;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            color: #60a5fa;
            font-weight: 600;
        }

        /* Main Split Screen Layout */
        .app-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 74px);
            overflow: hidden;
        }

        /* Left Side: Video Player */
        .player-side {
            flex: 7; /* Takes 70% width */
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .video-wrapper {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        .video-js {
            width: 100%;
            height: 100%;
        }

        .current-title {
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            color: var(--text-color);
        }

        /* Right Side: Sidebar (Search + Filter + Channel List) */
        .sidebar-side {
            flex: 3; /* Takes 30% width */
            background-color: var(--sidebar-bg);
            border-left: 1px solid #374151;
            display: flex;
            flex-direction: column;
            min-width: 320px;
        }

        /* Search area inside sidebar */
        .search-container {
            padding: 15px;
            border-bottom: 1px solid #374151;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.2);
        }

        .search-container input, .search-container select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #4b5563;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        .search-container input:focus, .search-container select:focus {
            border-color: var(--accent-color);
        }

        /* Scrollable Channel List */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Custom Scrollbar for channel list */
        .channel-list::-webkit-scrollbar {
            width: 6px;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background-color: #4b5563;
            border-radius: 4px;
        }

        /* Vertical Channel Row/Card */
        .channel-row {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            position: relative;
        }

        .channel-row:hover {
            background-color: #374151;
            border-color: var(--accent-color);
        }

        .channel-row.active {
            background-color: rgba(37, 99, 235, 0.2);
            border-color: var(--accent-color);
        }

        .ch-num {
            font-size: 11px;
            color: var(--text-muted);
            min-width: 25px;
            font-weight: bold;
        }

        .ch-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
            background-color: #111827;
            border-radius: 6px;
            margin-right: 12px;
            padding: 2px;
        }

        .ch-details {
            flex: 1;
            overflow: hidden;
        }

        .ch-name {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ch-group {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Responsive Layout for Mobile Screens */
        @media (max-width: 900px) {
            body {
                overflow: auto;
            }
            .app-container {
                flex-direction: column;
                height: auto;
                overflow: visible;
            }
            .player-side {
                flex: none;
                width: 100%;
                padding: 10px;
            }
            .sidebar-side {
                flex: none;
                width: 100%;
                height: 500px;
                border-left: none;
                border-top: 1px solid #374151;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Live IPTV Stream</h1>
        <div style="font-size: 12px; color: var(--text-muted);">Total Channels: <span id="totalCh">0</span></div>
    </header>

    <div class="app-container">
        
        <div class="player-side">
            <div class="video-wrapper">
                <video id="iptv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
                    <p class="vjs-no-js">To view this video please enable JavaScript</p>
                </video>
            </div>
            <div class="current-title" id="currentPlaying">লোডিং...</div>
        </div>

        <div class="sidebar-side">
            
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="চ্যানেলের নাম লিখুন...">
                <select id="groupFilter">
                    <option value="all">সব ক্যাটাগরি</option>

                    <option value="Movies">Movies</option>
                    <option value="Kids">Kids</option>
                    <option value="Music">Music</option>
                </select>
            </div>

            <div class="channel-list" id="channelListContainer">
                </div>

        </div>

    </div>

            { id: 25, name: "SONY KAL HINDI", logo: "https://upload.wikimedia.org/wikipedia/hi/6/6e/Sony_Kal_Logo.jpeg", url: "https://spt-sonykal-1-us.lg.wurl.tv/playlist.m3u8", group: "Movies" },
            { id: 26, name: "9xm", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQogiI0ZhtYbSjXstxsTfj9b18B71Qhn8WlsUxvhya48ARy8ZVJNNrR7sNCPxjRgJBQIo17LDP_gQca-iryfA3R6B2cB64WQLmE3-ASmSOtiA", url: "https://d35j504z0x2vu2.cloudfront.net/v1/master/0bc8e8376bd8417a1b6761138aa41c26c7309312/9xm/master.m3u8", group: "Music" },
            { id: 27, name: "Music India", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVv4W8vUZYWP-CbojHbEgJzST2qclgnq6V06LV6BVvALbQiRlJUDb1PLoL&s=10", url: "https://cdn-2.pishow.tv/live/226/master.m3u8", group: "Music" }
        ];

        let currentActiveId = null;

        // Initialize Video.js
        const player = videojs('iptv-player', {
            fluid: true,
            autoplay: false,
            controls: true
        });

        // DOM Elements
        const channelListContainer = document.getElementById('channelListContainer');
        const searchBar = document.getElementById('searchBar');
        const groupFilter = document.getElementById('groupFilter');
        const currentPlayingText = document.getElementById('currentPlaying');
        const totalChSpan = document.getElementById('totalCh');

        // Render Sidebar Channels
        function renderChannels(list) {
            channelListContainer.innerHTML = "";
            totalChSpan.innerText = list.length;

            if(list.length === 0) {
                channelListContainer.innerHTML = `<p style="text-align:center; padding: 20px; color:var(--text-muted);">কোনো চ্যানেল মেলেনি!</p>`;
                return;
            }

            list.forEach(channel => {
                const row = document.createElement('div');
                row.className = `channel-row ${channel.id === currentActiveId ? 'active' : ''}`;
                row.id = `ch-${channel.id}`;
                
                row.onclick = () => playChannel(channel);

                row.innerHTML = `
                    <div class="ch-num">${channel.id}</div>
                    <img class="ch-logo" src="${channel.logo}" alt="" onerror="this.src='https://placehold.co/70x70/1e293b/fff?text=TV'">
                    <div class="ch-details">
                        <div class="ch-name">${channel.name}</div>
                        <div class="ch-group">${channel.group}</div>
                    </div>
                `;
                channelListContainer.appendChild(row);
            });
        }

        // Play Selected Channel
        function playChannel(channel) {
            currentActiveId = channel.id;
            
            // Highlight current active row
            document.querySelectorAll('.channel-row').forEach(r => r.classList.remove('active'));
            const activeRow = document.getElementById(`ch-${channel.id}`);
            if(activeRow) activeRow.classList.add('active');

            // Change stream source
            player.src({
                src: channel.url,
                type: 'application/x-mpegURL'
            });
            player.play().catch(error => {
                console.log("Autoplay blocked or link broken.");
            });

            currentPlayingText.innerText = `এখন চলছে: ${channel.name} (${channel.group})`;
        }

        // Search & Filter Handler
        function filterChannels() {
            const query = searchBar.value.toLowerCase();
            const selectedGroup = groupFilter.value;

            const filtered = channels.filter(ch => {
                const matchSearch = ch.name.toLowerCase().includes(query);
                const matchGroup = selectedGroup === 'all' || ch.group === selectedGroup;
                return matchSearch && matchGroup;
            });

            renderChannels(filtered);
        }

        // Listeners
        searchBar.addEventListener('input', filterChannels);
        groupFilter.addEventListener('change', filterChannels);

        // Run on Load
        renderChannels(channels);
        if(channels.length > 0) {
            playChannel(channels[0]); // অটোমেটিক ১ম চ্যানেল প্লে হবে
        }
    </script>
</body>
</html>

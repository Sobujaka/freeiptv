<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jahangir IPTV - Original Premium Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        /* Video Player Absolute Overlay Styling */
        .video-js { font-family: sans-serif !important; color: #fff !important; }
        .vjs-control-bar { background-color: rgba(15, 23, 42, 0.9) !important; backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-[#070a13] text-slate-100 font-sans h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-[#0f1524] border-b border-slate-800/60 px-6 py-4 flex items-center justify-between shrink-0 shadow-xl z-20">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-tv text-indigo-500 text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wide text-white">Jahangir <span class="text-indigo-400">IPTV</span></h1>
        </div>
        <div class="w-full max-w-md mx-4">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchBar" placeholder="Search channels by name or number..." class="w-full bg-[#070a13] border border-slate-700 rounded-full pl-10 pr-4 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors">
            </div>
        </div>
        <div class="hidden md:block text-xs bg-indigo-950/40 border border-indigo-800/40 text-indigo-300 px-3 py-1.5 rounded-lg">
            <i class="fa-solid fa-keyboard mr-1"></i> Type numbers <b class="text-white">12, 13</b> to switch channel
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside class="w-60 bg-[#0f1524] border-r border-slate-800/60 flex flex-col shrink-0 z-10">
            <div class="p-4 border-b border-slate-800/40">
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Categories</h2>
            </div>
            <div id="groupList" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden p-6 relative bg-[#070a13]">
            <div class="flex items-center justify-between mb-5">
                <h2 id="currentCategoryTitle" class="text-lg font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-layer-group text-indigo-400"></i> All Channels
                </h2>
                <span id="channelCount" class="text-xs bg-indigo-950/60 text-indigo-300 px-3 py-1 rounded-full border border-indigo-900/50 font-mono">3 Channels</span>
            </div>
            
            <div id="channelsGrid" class="flex-1 overflow-y-auto custom-scrollbar grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 content-start pb-10">
                </div>
        </main>

        <div id="fullscreenPlayerWrapper" class="absolute inset-0 bg-black z-50 flex items-center justify-center hidden">
            <button onclick="closeCinemaPlayer()" class="absolute top-5 right-5 bg-slate-900/80 hover:bg-rose-600 text-white w-10 h-10 rounded-full flex items-center justify-center transition-all z-50 border border-slate-700 shadow-2xl group">
                <i class="fa-solid fa-xmark text-lg group-hover:scale-110"></i>
            </button>

            <div id="channelOverlay" class="absolute top-6 left-6 bg-slate-900/90 backdrop-blur border border-indigo-500/40 px-5 py-3 rounded-2xl flex items-center gap-4 z-50 opacity-0 pointer-events-none transition-all duration-300 shadow-2xl">
                <div class="text-2xl font-black font-mono text-indigo-400" id="overlayNumber">00</div>
                <div class="h-6 w-[1px] bg-slate-700"></div>
                <div class="text-sm font-bold text-white" id="overlayName">Loading...</div>
            </div>

            <div id="remoteTypingOverlay" class="absolute bg-indigo-600 border border-indigo-400 text-white font-mono font-black text-4xl px-8 py-4 rounded-2xl z-50 shadow-2xl hidden">
                <span class="text-[10px] text-indigo-200 block font-sans font-bold tracking-widest uppercase mb-1">REMOTE INPUT</span>
                CH <span id="remoteLiveNumber" class="text-yellow-300"></span>
            </div>

            <video id="iptv-cinema-player" class="video-js vjs-default-skin w-full h-full object-contain"></video>
        </div>

    </div>

    <script>
        // --- IPTV Channel Database ---
        // আপনার কার্টুন নেটওয়ার্ক সহ আইডি ১২, ১৩ নাম্বার ডেমো চ্যানেল দিয়ে সেট করা
        const channels = [
            { 
                id: 1, 
                number: "1", 
                name: "Cartoon Network", 
                group: "Kids", 
                logo: "https://i.ibb.co.com/8B0Lpzd/1000021166.png", 
                url: "https://vodzong.mjunoon.tv:8087/streamtest/cartoon-network-87/playlist.m3u8" 
            },
            { 
                id: 12, 
                number: "12", 
                name: "Somoy TV HD (Demo 12)", 
                group: "News", 
                logo: "https://www.somoynews.tv/themes/somoy/images/logo.png", 
                url: "https://vodzong.mjunoon.tv:8087/streamtest/cartoon-network-87/playlist.m3u8" // টেস্ট করার জন্য কার্টুন নেটওয়ার্ক লিংকই দেওয়া
            },
            { 
                id: 13, 
                number: "13", 
                name: "Sony Sports 1 (Demo 13)", 
                group: "Sports", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/2/23/Sony_Sports_Network_logo.png", 
                url: "https://vodzong.mjunoon.tv:8087/streamtest/cartoon-network-87/playlist.m3u8" // টেস্ট করার জন্য কার্টুন নেটওয়ার্ক লিংকই দেওয়া
            }
        ];

        let selectedCategory = "All";
        let searchQuery = "";
        let vjsPlayer;

        // Multi-digit keyboard buffer variables
        let keyboardBufferString = "";
        let keyboardBufferTimer = null;

        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Video.js
            vjsPlayer = videojs('iptv-cinema-player', {
                controls: true,
                autoplay: false,
                preload: 'auto'
            });

            renderGroups();
            renderChannelsGrid();

            // Search Filter
            document.getElementById('searchBar').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderChannelsGrid();
            });

            // ⌨️ MULTI-DIGIT KEYBOARD REMOTE SYSTEM (12, 13, 105 Fix)
            document.addEventListener('keydown', (e) => {
                if (document.activeElement.tagName === 'INPUT') return;

                // Numbers (0-9) checker
                if (e.key >= '0' && e.key <= '9') {
                    clearTimeout(keyboardBufferTimer);
                    keyboardBufferString += e.key;

                    // Display typing box over center screen
                    const typeOverlay = document.getElementById('remoteTypingOverlay');
                    document.getElementById('remoteLiveNumber').innerText = keyboardBufferString;
                    
                    // Show overlay wrapper if hidden
                    document.getElementById('fullscreenPlayerWrapper').classList.remove('hidden');
                    typeOverlay.classList.remove('hidden');

                    // 1.2 seconds window for typing multiple digits
                    keyboardBufferTimer = setTimeout(() => {
                        executeRemoteChannelChange(keyboardBufferString);
                        keyboardBufferString = ""; // Clear buffer
                        typeOverlay.classList.add('hidden');
                    }, 1200);
                }
            });
        });

        // Parse buffer and switch channel
        function executeRemoteChannelChange(typedNum) {
            const cleanNum = String(parseInt(typedNum, 10));
            const matchedChannel = channels.find(ch => String(ch.number) === cleanNum);

            if (matchedChannel) {
                playChannel(matchedChannel.id);
            } else {
                alert(`Channel number ${cleanNum} not found!`);
                // If no stream active, hide player wrapper again
                if(!vjsPlayer.src()) {
                    document.getElementById('fullscreenPlayerWrapper').classList.add('hidden');
                }
            }
        }

        // Render Categories
        function renderGroups() {
            const groupList = document.getElementById('groupList');
            const groups = ['All', ...new Set(channels.map(ch => ch.group))];
            
            groupList.innerHTML = groups.map(group => {
                const isActive = selectedCategory === group;
                const icon = group === 'All' ? 'fa-list' : group === 'News' ? 'fa-newspaper' : group === 'Sports' ? 'fa-trophy' : group === 'Kids' ? 'fa-child' : 'fa-film';
                
                return `
                    <button onclick="filterCategory('${group}')" class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 text-left ${isActive ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200'}">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid ${icon} w-4 text-center"></i>
                            <span>${group}</span>
                        </div>
                        <span class="text-xs px-2 py-0.5 rounded-md bg-slate-950/40 text-slate-400">${group === 'All' ? channels.length : channels.filter(c => c.group === group).length}</span>
                    </button>
                `;
            }).join('');
        }

        function filterCategory(category) {
            selectedCategory = category;
            document.getElementById('currentCategoryTitle').innerHTML = `<i class="fa-solid fa-layer-group text-indigo-400"></i> ${category} Channels`;
            renderGroups();
            renderChannelsGrid();
        }

        // Render Beautiful Original Grid Items
        function renderChannelsGrid() {
            const grid = document.getElementById('channelsGrid');
            
            const filteredChannels = channels.filter(channel => {
                const matchesCategory = selectedCategory === 'All' || channel.group === selectedCategory;
                const matchesSearch = channel.name.toLowerCase().includes(searchQuery) || channel.number.includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            document.getElementById('channelCount').innerText = `${filteredChannels.length} Channels`;

            if(filteredChannels.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-slate-500"><i class="fa-solid fa-folder-open text-4xl mb-2 block"></i> No channels found</div>`;
                return;
            }

            grid.innerHTML = filteredChannels.map(channel => `
                <div onclick="playChannel(${channel.id})" class="bg-[#0f1524] border border-slate-800/80 rounded-2xl p-4 flex flex-col items-center justify-between text-center cursor-pointer hover:border-indigo-500 hover:bg-[#131b2e] transition-all duration-200 group relative overflow-hidden aspect-square shadow-md">
                    <span class="absolute top-3 left-3 text-[10px] font-mono bg-slate-950/80 text-indigo-400 px-2 py-0.5 rounded-md border border-slate-800">Ch ${channel.number}</span>
                    <div class="w-20 h-20 flex items-center justify-center my-auto">
                        <img src="${channel.logo}" alt="${channel.name}" onerror="this.src='https://placehold.co/100x100/1e293b/cbd5e1?text=TV'" class="max-w-full max-h-full object-contain filter drop-shadow-lg group-hover:scale-105 transition-transform duration-300">
                    </div>
                    <div class="w-full mt-2">
                        <div class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider mb-0.5">${channel.group}</div>
                        <h3 class="text-xs font-bold text-slate-200 group-hover:text-indigo-400 transition-colors truncate">${channel.name}</h3>
                    </div>
                </div>
            `).join('');
        }

        // Open Stream Mode inside Fullscreen Container
        function playChannel(id) {
            const channel = channels.find(c => c.id === id);
            if(!channel) return;

            // Unhide video screen frame layer
            document.getElementById('fullscreenPlayerWrapper').classList.remove('hidden');
            
            vjsPlayer.src({
                src: channel.url,
                type: 'application/x-mpegURL'
            });
            vjsPlayer.play();

            // Flash Channel Indicator Overlay Banner
            const flashOverlay = document.getElementById('channelOverlay');
            document.getElementById('overlayNumber').innerText = channel.number.padStart(2, '0');
            document.getElementById('overlayName').innerText = channel.name;
            
            flashOverlay.classList.remove('opacity-0');
            flashOverlay.classList.add('opacity-100');
            
            setTimeout(() => {
                flashOverlay.classList.remove('opacity-100');
                flashOverlay.classList.add('opacity-0');
            }, 2500);
        }

        // Exit cinema mode and return back to grid screen
        function closeCinemaPlayer() {
            vjsPlayer.pause();
            document.getElementById('fullscreenPlayerWrapper').classList.add('hidden');
        }
    </script>
</body>
</html>

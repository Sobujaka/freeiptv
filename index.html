<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jahangir IPTV PRO HD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-nav: #0b111e;
            --bg-main: #080c14;
            --bg-sidebar: #0d1527;
            --bg-card: #131d31;
            --accent-color: #5856d6;
            --text-main: #f8fafc;
            --text-muted: #4e5d78;
            --border-color: #1a263e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 1. TOP NAVBAR */
        .navbar {
            height: 65px;
            background-color: var(--bg-nav);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo i {
            font-size: 22px;
            color: var(--accent-color);
        }

        .logo-text {
            font-size: 19px;
            font-weight: 700;
        }

        .badge-hd {
            background-color: var(--accent-color);
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }

        .search-wrapper {
            position: relative;
            width: 450px;
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #4e5d78;
        }

        .search-box {
            width: 100%;
            padding: 9px 15px 9px 42px;
            background-color: #060a12;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .hint-keyboard {
            font-size: 12px;
            color: #4e5d78;
            background: #0d1527;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        .hint-keyboard span {
            color: #f59e0b;
            font-weight: bold;
        }

        /* MAIN THREE COLUMN LAYOUT */
        .app-body {
            display: flex;
            flex: 1;
            height: calc(100vh - 65px);
            overflow: hidden;
        }

        /* COLUMN 1: CATEGORIES */
        .col-categories {
            width: 220px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 20px 10px;
            box-sizing: border-box;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-left: 10px;
        }

        .cat-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            color: #8a99ad;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .cat-btn i {
            margin-right: 10px;
            width: 16px;
        }

        .cat-btn:hover, .cat-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        .cat-count {
            font-size: 11px;
            background-color: rgba(0,0,0,0.2);
            padding: 2px 6px;
            border-radius: 4px;
            color: inherit;
        }

        /* COLUMN 2: CHANNELS LIST GRID */
        .col-channels {
            width: 340px; /* নাম না থাকায় কলামের সাইজ কিছুটা কমানো হলো স্পেস বাঁচাতে */
            background-color: var(--bg-main);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .channels-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .channels-header h3 {
            margin: 0;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .grid-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .grid-scroll::-webkit-scrollbar-thumb {
            background: #1a263e;
            border-radius: 10px;
        }

        .channel-subgrid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        /* কার্ডের ডিজাইন উন্নত করা হলো নাম ছাড়া ফিট করার জন্য */
        .ch-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .ch-card:hover, .ch-card.active {
            border-color: var(--accent-color);
            background-color: #17243e;
        }

        .ch-thumb {
            width: 44px;
            height: 44px;
            background: #060a12;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ch-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .ch-meta {
            overflow: hidden;
            flex: 1;
        }

        .meta-label {
            font-size: 12px;
            color: #a4b3cf;
            font-weight: bold;
        }

        .ch-card.active .meta-label {
            color: #a4b3cf;
        }

        /* COLUMN 3: BIG VIDEO PLAYER */
        .col-player {
            flex: 1;
            background-color: #000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .player-inner {
            flex: 1;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Control bar for CORS proxy */
        .proxy-control-bar {
            background-color: var(--bg-nav);
            border-top: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
        }

        .proxy-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            background-color: #1a263e;
            border-radius: 20px;
            transition: 0.3s;
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: white;
            top: 3px;
            left: 3px;
            transition: 0.3s;
        }

        input[type="checkbox"]:checked + .toggle-switch {
            background-color: var(--accent-color);
        }

        input[type="checkbox"]:checked + .toggle-switch::before {
            left: 19px;
        }

        .no-data {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            font-size: 13px;
        }
    </style>
</head>

    const video = document.getElementById('videoPlayer');
    const categoryBox = document.getElementById('categoryBox');
    const channelGrid = document.getElementById('channelGrid');
    const mainSearch = document.getElementById('mainSearch');
    const proxyToggler = document.getElementById('proxyToggler');

    let hls = null;
    let selectedCategory = 'All';
    let activeStreamUrl = "";

    // ১. ক্যাটাগরি প্যানেল জেনারেটর
    function setupCategories() {
        const counts = { All: channels.length };
        channels.forEach(c => counts[c.group] = (counts[c.group] || 0) + 1);

        const config = [
            { id: 'All', name: 'All', icon: 'fa-list' },
            { id: 'Kids', name: 'Kids', icon: 'fa-child' },
            { id: 'News', name: 'News', icon: 'fa-newspaper' },
            { id: 'Movies', name: 'Movies', icon: 'fa-film' },
            { id: 'Music', name: 'Music', icon: 'fa-music' },
            { id: 'Entertainment', name: 'Entertainment', icon: 'fa-tv' }
        ];

        categoryBox.innerHTML = "";
        config.forEach(cat => {
            if(counts[cat.id] || cat.id === 'All') {
                const div = document.createElement('div');
                div.className = `cat-btn ${selectedCategory === cat.id ? 'active' : ''}`;
                div.onclick = () => {
                    selectedCategory = cat.id;
                    document.getElementById('panelTitle').innerHTML = `<i class="fa-solid fa-layer-group"></i> ${cat.id} Channels`;
                    setupCategories();
                    applyFilter();
                };
                div.innerHTML = `
                    <div><i class="fa-solid ${cat.icon}"></i> ${cat.name}</div>
                    <span class="cat-count">${counts[cat.id] || 0}</span>
                `;
                categoryBox.appendChild(div);
            }
        });
    }

    // ২. স্মার্ট ফিল্টার (নাম দেখা না গেলেও নাম দিয়ে সার্চ করা যাবে)
    function applyFilter() {
        const query = mainSearch.value.toLowerCase().trim();
        
        const filtered = channels.filter(ch => {
            const matchCat = (selectedCategory === 'All' || ch.group === selectedCategory);
            // এখানে ব্যাকএন্ডে নাম (ch.name) সার্চ ইঞ্জিনের সাথে ম্যাচ করবে
            const matchSearch = (ch.name.toLowerCase().includes(query) || 
                                 ch.number.toString() === query || 
                                 ch.group.toLowerCase().includes(query));
            return matchCat && matchSearch;
        });

        document.getElementById('panelCount').innerText = filtered.length;
        renderGrid(filtered);
    }

    // ৩. মিডল গ্রিড রেন্ডার (এখানে কার্ড থেকে নাম টোটাল মুছে ফেলা হয়েছে)
    function renderGrid(list) {
        channelGrid.innerHTML = "";
        if(list.length === 0) {
            channelGrid.innerHTML = `<div class="no-data">No channels found</div>`;
            return;
        }

        list.forEach(ch => {
            const card = document.createElement('div');
            card.className = `ch-card ${activeStreamUrl === ch.url ? 'active' : ''}`;
            card.id = `ch-${ch.number}`;
            card.onclick = () => triggerPlay(ch.url, ch.number);

            // কার্ডে শুধুমাত্র লোগো এবং নম্বর থাকবে, কোনো নাম থাকবে না
            card.innerHTML = `
                <div class="ch-thumb">
                    <img src="${ch.logo}" alt="" onerror="this.src='https://via.placeholder.com/44x44/0d1527/fff?text=TV'">
                </div>
                <div class="ch-meta">
                    <div class="meta-label">CH ${ch.number}</div>
                </div>
            `;
            channelGrid.appendChild(card);
        });
    }

    // ৪. ভিডিও প্লেয়ার ইঞ্জিন
    function triggerPlay(url, chNum) {
        activeStreamUrl = url;
        
        document.querySelectorAll('.ch-card').forEach(c => c.classList.remove('active'));
        const selectedCard = document.getElementById(`ch-${chNum}`);
        if(selectedCard) selectedCard.classList.add('active');

        let finalUrl = url;
        if(proxyToggler.checked) {
            finalUrl = "https://cors-anywhere.herokuapp.com/" + url; 
        }

        if (Hls.isSupported()) {
            if (hls) hls.destroy();
            hls = new Hls({ maxChunksQueueSize: 20, enableWorker: true });
            hls.loadSource(finalUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = finalUrl;
            video.addEventListener('loadedmetadata', () => video.play());
        }
    }

    proxyToggler.addEventListener('change', () => {
        if(activeStreamUrl) {
            const currentActive = channels.find(c => c.url === activeStreamUrl);
            if(currentActive) triggerPlay(activeStreamUrl, currentActive.number);
        }
    });

    mainSearch.addEventListener('input', applyFilter);

    window.addEventListener('keydown', (e) => {
        if (document.activeElement === mainSearch) return;
        if (e.key >= '1' && e.key <= '9') {
            const target = channels.find(ch => ch.number === e.key);
            if (target) triggerPlay(target.url, target.number);
        }
    });

    setupCategories();
    applyFilter();

    if(channels.length > 0) {
        setTimeout(() => {
            triggerPlay(channels[0].url, channels[0].number);
        }, 500);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jahangir IPTV Premium - Ultimate Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        /* Fix for Broken Player Texts & Maximizing Player Size */
        .video-js { font-family: sans-serif !important; color: #fff !important; width: 100% !important; height: 100% !important; background-color: #000 !important; }
        .video-js .vjs-big-play-button { background-color: #4f46e5 !important; border-radius: 50% !important; width: 2.5em !important; height: 2.5em !important; line-height: 2.5em !important; margin-top: -1.25em !important; margin-left: -1.25em !important; border: none !important; }
        .vjs-control-bar { background-color: rgba(15, 23, 42, 0.9) !important; backdrop-filter: blur(8px); }
        .vjs-hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#070a13] text-slate-100 font-sans h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-[#0f1524] border-b border-slate-800/80 px-6 py-3 flex flex-wrap items-center justify-between shrink-0 gap-4 z-20 shadow-lg">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-tv text-indigo-500 text-xl"></i>
            <h1 class="text-lg font-bold tracking-wide text-white">Jahangir <span class="text-indigo-400">IPTV Pro</span></h1>
        </div>

        <div class="flex items-center gap-3 flex-wrap">
            <label class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2 rounded-xl cursor-pointer transition-all flex items-center gap-2 shadow-md">
                <i class="fa-solid fa-file-import"></i> Upload M3U List
                <input type="file" id="m3uFileUploader" accept=".m3u,.m3u8" class="hidden">
            </label>
            
            <button onclick="deleteActiveDeadChannel()" class="bg-rose-600/20 hover:bg-rose-600 text-rose-400 hover:text-white border border-rose-500/30 text-xs font-bold px-4 py-2 rounded-xl transition-all flex items-center gap-2">
                <i class="fa-solid fa-trash-can"></i> Remove Dead Link
            </button>

            <button onclick="downloadCleanM3UFile()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all flex items-center gap-2 shadow-md">
                <i class="fa-solid fa-cloud-arrow-down"></i> Download Clean M3U
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside class="w-48 lg:w-56 bg-[#0f1524] border-r border-slate-800/60 flex flex-col shrink-0 z-10">
            <div class="p-3 border-b border-slate-800/40">
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Categories</h2>
            </div>
            <div id="groupContainer" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                </div>
        </aside>

        <div class="w-[32%] min-w-[320px] bg-[#070a13] border-r border-slate-800/60 flex flex-col overflow-hidden p-3 z-10">
            <div class="flex items-center justify-between mb-3 px-1">
                <h2 id="categoryViewTitle" class="text-xs font-bold text-slate-300 uppercase tracking-wider flex items-center gap-1.5">
                    <i class="fa-solid fa-layer-group text-indigo-400"></i> All Channels
                </h2>
                <span id="channelBadgeCounter" class="text-[10px] bg-indigo-950 text-indigo-300 px-2 py-0.5 rounded-md border border-indigo-900/40 font-mono font-bold">0</span>
            </div>

            <div id="channelsGridArea" class="flex-1 overflow-y-auto custom-scrollbar grid grid-cols-2 gap-2.5 content-start pb-4">
                <div class="col-span-full py-12 text-center text-slate-600 text-xs px-2">
                    <i class="fa-solid fa-arrow-up text-2xl mb-2 text-indigo-500/20 block animate-bounce"></i>
                    Upload your .m3u or .m3u8 playlist file to view channels here.
                </div>
            </div>
        </div>

        <main class="flex-1 bg-black flex flex-col relative justify-center items-center overflow-hidden">
            
            <div id="channelIndicatorAlert" class="absolute top-5 left-5 bg-slate-900/95 backdrop-blur border border-indigo-500/40 px-5 py-2.5 rounded-xl flex items-center gap-3 z-30 opacity-0 pointer-events-none transition-all duration-300 shadow-2xl">
                <div class="text-xl font-black font-mono text-indigo-400" id="alertChNum">00</div>
                <div class="h-6 w-[1px] bg-slate-800"></div>
                <div class="text-xs font-bold text-white tracking-wide" id="alertChName">Loading Stream...</div>
            </div>

            <div id="remoteKeystrokeOverlay" class="absolute bg-indigo-600 border border-indigo-400 text-white font-mono font-black text-4xl px-8 py-4 rounded-2xl z-40 shadow-2xl hidden">
                <span class="text-[10px] text-indigo-200 block font-sans font-bold tracking-widest uppercase mb-1">REMOTE INPUT</span>
                CH <span id="remoteLiveTypedNumber" class="text-yellow-300"></span>
            </div>

            <div class="w-full h-full relative bg-black flex items-center justify-center">
                <div id="videoScreenPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 p-6 text-center bg-gradient-to-b from-[#0f1524] via-[#070a13] to-black z-10">
                    <div class="w-14 h-14 bg-indigo-600/10 border border-indigo-500/20 rounded-full flex items-center justify-center mb-3 shadow-xl">
                        <i class="fa-solid fa-circle-play text-xl text-indigo-400 animate-pulse"></i>
                    </div>
                    <p class="text-xs font-bold text-slate-300">Cinema Display Frame Active</p>
                    <p class="text-[11px] text-slate-600 mt-1 max-w-xs">Directly type multi-digit channel sequence like <span class="text-indigo-400 font-bold font-mono">12</span>, <span class="text-indigo-400 font-bold font-mono">13</span>, or <span class="text-indigo-400 font-bold font-mono">14</span> on your keyboard.</p>
                </div>
                
                <video id="jahangir-iptv-engine" class="video-js vjs-default-skin w-full h-

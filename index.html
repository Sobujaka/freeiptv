<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jahangir IPTV Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --text-color: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            background-color: var(--card-bg);
            padding: 15px 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        @media(min-width: 768px) {
            .header-container {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--accent-color);
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input, select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #475569;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        input {
            min-width: 200px;
        }

        /* Player Section */
        .player-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 10px;
        }

        .video-js {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            aspect-ratio: 16 / 9;
        }

        .current-playing {
            text-align: center;
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #94a3b8;
        }

        /* Grid Layout */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .channel-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }

        .channel-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            border-color: var(--accent-color);
        }

        .channel-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            color: #cbd5e1;
        }

        .channel-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin: 10px auto;
            background-color: #0f172a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #64748b;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-group {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>Live IPTV Player</h1>
            <div class="controls">
                <input type="text" id="searchBar" placeholder="চ্যানেল খুঁজুন...">
                
                <select id="groupFilter">

                    <option value="Bangla">Bangla TV</option>
                    <option value="Movies">Movies</option>
                    <option value="Kids">Kids</option>
                    <option value="Music">Music</option>
                </select>
            </div>
        </div>
    </header>

    <div class="player-container">
        <video id="iptv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
            <p class="vjs-no-js">ভিডিও দেখতে ব্রাউজারে জাভাস্ক্রিপ্ট সচল করুন।</p>
        </video>
        <div class="current-playing" id="currentPlaying">এখন চলছে: BTV</div>
    </div>

    <main class="main-container">
        <div class="channel-grid" id="channelGrid">
            </div>
    </main>

        ];

        // Initialize Video.js Player
        const player = videojs('iptv-player', {
            fluid: true,
            playbackRates: [0.5, 1, 1.5, 2]
        });

        // DOM Elements
        const channelGrid = document.getElementById('channelGrid');
        const searchBar = document.getElementById('searchBar');
        const groupFilter = document.getElementById('groupFilter');
        const currentPlayingText = document.getElementById('currentPlaying');

        // Render Channel Grid Function 
        function displayChannels(channelList) {
            channelGrid.innerHTML = "";
            if(channelList.length === 0) {
                channelGrid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:#64748b;">কোনো চ্যানেল পাওয়া যায়নি!</p>`;
                return;
            }

            channelList.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.onclick = () => playChannel(channel);

                // Handling broken links or placeholder logos
                const logoSrc = channel.logo ? channel.logo : "https://via.placeholder.com/70x70?text=No+Logo";

                card.innerHTML = `
                    <div class="channel-number">#${channel.id}</div>
                    <img class="channel-logo" src="${logoSrc}" alt="${channel.name}" onerror="this.src='https://placehold.co/70x70/1e293b/fff?text=TV'">
                    <div class="channel-name">${channel.name}</div>
                    <div class="channel-group">${channel.group}</div>
                `;
                channelGrid.appendChild(card);
            });
        }

        // Change Channel Function
        function playChannel(channel) {
            player.src({
                src: channel.url,
                type: 'application/x-mpegURL'
            });
            player.play();
            currentPlayingText.innerText = `এখন চলছে: ${channel.name}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Search and Filter Logic
        function filterChannels() {
            const searchTerm = searchBar.value.toLowerCase();
            const selectedGroup = groupFilter.value;

            const filtered = channels.filter(channel => {
                const matchesSearch = channel.name.toLowerCase().includes(searchTerm);
                const matchesGroup = selectedGroup === 'all' || channel.group === selectedGroup;
                return matchesSearch && matchesGroup;
            });

            displayChannels(filtered);
        }

        // Event Listeners
        searchBar.addEventListener('input', filterChannels);
        groupFilter.addEventListener('change', filterChannels);

        // Initial Load 
        displayChannels(channels);
        // Play First Channel Default
        playChannel(channels[0]);

    </script>

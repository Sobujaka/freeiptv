<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রো IPTV প্লেয়ার</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #11141a;
            color: #ffffff;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            color: #00ff88;
            font-size: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* প্লেয়ার সেকশন */
        .player-section {
            background-color: #1a1f29;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-container {
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        .video-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }

        .current-channel-info {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ff88;
        }

        /* চ্যানেল কন্ট্রোল এবং লিস্ট সেকশন */
        .channel-section {
            background-color: #1a1f29;
            padding: 20px;
            border-radius: 12px;
        }

        /* সার্চ ও গ্রুপ ফিল্টার স্টাইল */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            border: 2px solid #252d3d;
            border-radius: 8px;
            background-color: #11141a;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            border-color: #00ff88;
        }

        .groups-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        /* স্ক্রোলবার হাইড করার জন্য */
        .groups-container::-webkit-scrollbar {
            height: 4px;
        }
        .groups-container::-webkit-scrollbar-thumb {
            background-color: #333d4f;
            border-radius: 2px;
        }

        .group-btn {
            background-color: #252d3d;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .group-btn.active, .group-btn:hover {
            background-color: #00ff88;
            color: #11141a;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .channel-grid::-webkit-scrollbar {
            width: 6px;
        }
        .channel-grid::-webkit-scrollbar-thumb {
            background-color: #333d4f;
            border-radius: 4px;
        }

        /* চ্যানেল কার্ড স্টাইল */
        .channel-card {
            background-color: #252d3d;
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .channel-card:hover {
            transform: translateY(-3px);
            border-color: #00ff88;
            background-color: #2c374b;
        }

        .channel-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: #00ff88;
            color: #11141a;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* ফেভারিট হার্ট আইকন */
        .fav-btn {
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 1.2rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #55627a;
            transition: transform 0.2s;
        }

        .fav-btn:hover {
            transform: scale(1.2);
        }

        .fav-btn.is-fav {
            color: #ff3838;
        }

        .channel-logo {
            width: 75px;
            height: 75px;
            object-fit: contain;
            margin: 15px auto 8px auto;
            display: block;
            background-color: #fff;
            border-radius: 8px;
            padding: 5px;
        }

        .channel-name {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-channels {
            grid-column: 1 / -1;
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 1.1rem;
        }

        /* রেসপনসিভ লেআউট (ডেস্কটপ স্ক্রিনের জন্য সাইড-বাই-সাইড) */
        @media (min-width: 992px) {
            .container {
                grid-template-columns: 60% 40%;
                align-items: start;
            }
            .channel-grid {
                max-height: 65vh;
            }
        }
    </style>
</head>
<body>

            { number: "24", name: "&TV (1080p)", group: "Movies", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLRAXh5Fkd5YeGHnH5cinl9oJkZYD6rSAcog&s", link: "https://amg01117-amg01117c1-amgplt0165.playout.now3.amagi.tv/playlist.m3u8" },
            { number: "25", name: "SONY KAL HINDI", group: "Movies", logo: "https://upload.wikimedia.org/wikipedia/hi/6/6e/Sony_Kal_Logo.jpeg", link: "https://spt-sonykal-1-us.lg.wurl.tv/playlist.m3u8" },
            { number: "26", name: "9xm", group: "Music", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQogiI0ZhtYbSjXstxsTfj9b18B71Qhn8WlsUxvhya48ARy8ZVJNNrR7sNCPxjRgJBQIo17LDP_gQca-iryfA3R6B2cB64WQLmE3-ASmSOtiA", link: "https://d35j504z0x2vu2.cloudfront.net/v1/master/0bc8e8376bd8417a1b6761138aa41c26c7309312/9xm/master.m3u8?ads.rnd=123" },
            { number: "27", name: "Music India", group: "Music", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVv4W8vUZYWP-CbojHbEgJzST2qclgnq6V06LV6BVvALbQiRlJUDb1PLoL&s=10", link: "https://cdn-2.pishow.tv/live/226/master.m3u8" }
        ];

        let currentGroup = "all";
        let searchQuery = "";

        // Video.js প্লেয়ার ইনিশিয়ালাইজ করা
        const player = videojs('my-video', {
            fluid: true,
            autoplay: false,
            controls: true
        });

        const channelListContainer = document.getElementById('channel-list');
        const playingNowText = document.getElementById('playing-now');
        const searchInput = document.getElementById('search-input');
        const groupButtons = document.querySelectorAll('.group-btn');

        // চ্যানেল গ্রিড রেন্ডার করার মেইন ফাংশন (ফিল্টারিং সহ)
        function renderChannels() {
            channelListContainer.innerHTML = ""; // আগের লিস্ট ক্লিয়ার করা

            // ফিল্টারিং লজিক (Group + Search)
            const filteredChannels = channels.filter(channel => {
                // ১. গ্রুপ বা ফেভারিট ম্যাচিং
                let matchesGroup = false;
                if (currentGroup === "all") {
                    matchesGroup = true;
                } else if (currentGroup === "fav") {
                    matchesGroup = favoriteChannels.includes(channel.number);
                } else {
                    matchesGroup = channel.group === currentGroup;
                }

                // ২. সার্চ কুয়েরি ম্যাচিং (নাম অথবা নম্বরে খুঁজবে)
                const matchesSearch = channel.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      channel.number.includes(searchQuery);

                return matchesGroup && matchesSearch;
            });

            // যদি কোনো চ্যানেল না পাওয়া যায়
            if (filteredChannels.length === 0) {
                channelListContainer.innerHTML = `<div class="no-channels">কোনো চ্যানেল পাওয়া যায়নি!</div>`;
                return;
            }

            // স্ক্রিনে কার্ডগুলো তৈরি করা
            filteredChannels.forEach((channel) => {
                const isFav = favoriteChannels.includes(channel.number);
                const card = document.createElement('div');
                card.className = 'channel-card';
                
                const logoSrc = channel.logo ? channel.logo : `https://via.placeholder.com/80/252d3d/ffffff?text=${encodeURIComponent(channel.name)}`;

                card.innerHTML = `
                    <span class="channel-number">${channel.number}</span>
                    <button class="fav-btn ${isFav ? 'is-fav' : ''}" data-number="${channel.number}">
                        ${isFav ? '❤️' : '🤍'}
                    </button>
                    <img class="channel-logo" src="${logoSrc}" alt="${channel.name} Logo" onerror="this.src='https://via.placeholder.com/80/252d3d/ffffff?text=TV'">
                    <div class="channel-name" title="${channel.name}">${channel.name}</div>
                `;

                // কার্ডের লোগো বা নামের ওপর ক্লিক করলে প্লে হবে
                card.addEventListener('click', (e) => {
                    // যদি ফেভারিট বাটনে ক্লিক করা হয় তবে যাতে প্লে না হয়ে জাস্ট ফেভারিট টগল হয়
                    if (e.target.classList.contains('fav-btn')) return;
                    playChannel(channel);
                });

                // ফেভারিট বাটনের অ্যাকশন
                const favBtn = card.querySelector('.fav-btn');
                favBtn.addEventListener('click', (e) => {
                    toggleFavorite(channel.number);
                });

                channelListContainer.appendChild(card);
            });
        }

        // ফেভারিট অ্যাড/রিমুভ করার ফাংশন
        function toggleFavorite(channelNumber) {
            if (favoriteChannels.includes(channelNumber)) {
                favoriteChannels = favoriteChannels.filter(num => num !== channelNumber);
            } else {
                favoriteChannels.push(channelNumber);
            }
            // LocalStorage এ ডেটা সেভ রাখা
            localStorage.setItem('iptv_favs', JSON.stringify(favoriteChannels));
            renderChannels(); // স্ক্রিন রিফ্রেশ
        }

        // চ্যানেল প্লে করার ফাংশন
        function playChannel(channel) {
            playingNowText.innerText = `লোডিং হচ্ছে: [${channel.number}] ${channel.name}...`;
            
            player.src({
                src: channel.link,
                type: 'application/x-mpegURL'
            });
            
            player.play().then(() => {
                playingNowText.innerText = `এখন প্লে হচ্ছে: [${channel.number}] ${channel.name}`;
            }).catch(error => {
                playingNowText.innerText = `দুঃখিত! [${channel.number}] ${channel.name} চ্যানেলটি এই মুহূর্তে অফলাইন আছে।`;
            });
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // সার্চ ইনপুটের ইভেন্ট লিসেনার (টাইপ করার সাথে সাথে সার্চ হবে)
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderChannels();
        });

        // গ্রুপ/ক্যাটাগরি বাটনের ইভেন্ট লিসেনার
        groupButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // একটিভ ক্লাস চেঞ্জ করা
                groupButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                currentGroup = btn.getAttribute('data-group');
                renderChannels();
            });
        });

        // প্রথমবার পেজ লোড হলে রান হবে
        renderChannels();
        
        if(channels.length > 0) {
            player.src({
                src: channels[0].link,
                type: 'application/x-mpegURL'
            });
            playingNowText.innerText = `একটি চ্যানেল সিলেক্ট করুন (১ম চ্যানেল রেডি আছে: ${channels[0].name})`;
        }
    </script>
</body>
</html>

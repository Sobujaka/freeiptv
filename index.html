<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Web Player - Pro</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --accent-color: #2563eb;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --sidebar-width: 380px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* App Layout */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Left Side: Big Video Player */
        .player-section {
            flex: 1;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* Right Side: Sidebar (Search + Channels) */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #111827;
            border-left: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #1f2937;
            border-bottom: 1px solid #374151;
        }

        .sidebar-header h2 {
            margin: 0 0 15px 0;
            font-size: 20px;
            text-align: center;
            color: #3b82f6;
        }

        /* Search Bar */
        .search-box {
            width: 100%;
            padding: 12px 15px;
            font-size: 15px;
            background-color: var(--card-bg);
            border: 1px solid #475569;
            border-radius: 6px;
            color: var(--text-color);
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* Proxy Control Note */
        .proxy-note {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: center;
        }

        /* Channel List Container */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* Custom Scrollbar for Sidebar */
        .channel-list::-webkit-scrollbar {
            width: 6px;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }

        /* Channel Row/Card Layout */
        .channel-row {
            display: flex;
            align-items: center;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .channel-row:hover, .channel-row.active {
            background-color: #2563eb;
            border-color: #3b82f6;
        }

        .channel-num {
            font-size: 12px;
            font-weight: bold;
            background: #111827;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 12px;
            min-width: 20px;
            text-align: center;
        }

        .channel-img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            background: #0b0f19;
            border-radius: 6px;
            padding: 2px;
            margin-right: 15px;
        }

        .channel-info {
            flex: 1;
            overflow: hidden;
        }

        .channel-title {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-cat {
            font-size: 11px;
            color: var(--text-muted);
            background: #111827;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        .channel-row:hover .channel-cat, .channel-row.active .channel-cat {
            color: #fff;
            background: rgba(0,0,0,0.3);
        }

        .no-results {
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
        }

        /* Responsive UI for Mobile */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            .player-section {
                height: 40vh;
                flex: none;
            }
            .sidebar {
                width: 100%;
                height: 60vh;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="player-section">
        <video id="iptv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">

        </video>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>IPTV Web Player</h2>
            <input type="text" id="searchBar" class="search-box" placeholder="নাম, নম্বর বা ক্যাটাগরি লিখুন...">

        </div>

        <div class="channel-list" id="channelContainer">

    </div>

    // Initialize Video.js Player
    const player = videojs('iptv-player');
    const channelContainer = document.getElementById('channelContainer');
    const searchBar = document.getElementById('searchBar');

    // চ্যানেল রেন্ডার করার ফাংশন (লিস্ট আকারে)
    function displayChannels(channelList) {
        channelContainer.innerHTML = "";
        
        if (channelList.length === 0) {
            channelContainer.innerHTML = `<div class="no-results">কোনো চ্যানেল পাওয়া যায়নি!</div>`;
            return;
        }

        channelList.forEach(channel => {
            const row = document.createElement('div');
            row.className = 'channel-row';
            row.id = `ch-${channel.number}`;
            row.onclick = () => playChannel(channel.url, row);

            row.innerHTML = `
                <div class="channel-num">${channel.number}</div>
                <img class="channel-img" src="${channel.logo}" alt="${channel.name}" onerror="this.src='https://via.placeholder.com/50x50/1e293b/fff?text=TV'">
                <div class="channel-info">
                    <div class="channel-title">${channel.name}</div>
                    <div class="channel-cat">${channel.group}</div>
                </div>
            `;
            channelContainer.appendChild(row);
        });
    }

    // চ্যানেল প্লে করার ফাংশন
    function playChannel(url, element) {
        // রিমুভ ও অ্যাক্টিভ ক্লাস সেট করা
        document.querySelectorAll('.channel-row').forEach(r => r.classList.remove('active'));
        if(element) element.classList.add('active');

        // ভিডিও সোর্স সেট করা
        player.src({
            src: url,
            type: 'application/x-mpegURL'
        });
        
        player.ready(function() {
            player.play().catch(function(error) {
                console.log("CORS বা সার্ভার ব্লকের কারণে প্লে হতে পারছে না।");
            });
        });
    }

    // সার্চ ফিল্টার লজিক
    searchBar.addEventListener('input', (e) => {
        const searchTxt = e.target.value.toLowerCase().trim();
        
        const filtered = channels.filter(channel => {
            return channel.name.toLowerCase().includes(searchTxt) || 
                   channel.number.toString() === searchTxt || 
                   channel.group.toLowerCase().includes(searchTxt);
        });
        
        displayChannels(filtered);
    });

    // প্রথমবার সাইট লোড হলে সব চ্যানেল দেখাবে
    displayChannels(channels);
    // ডিফল্ট প্রথম চ্যানেল সিলেক্ট করা থাকবে
    if(channels.length > 0) {
        setTimeout(() => {
            const firstRow = document.getElementById(`ch-1`);
            if(firstRow) firstRow.classList.add('active');
        }, 500);
    }
</script>

</html>

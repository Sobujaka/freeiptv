<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jahangir IPTV PRO HD</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #090e1a;
            --bg-sidebar: #0f1626;
            --bg-card: #172237;
            --bg-nav: #0b1324;
            --accent-purple: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 1. TOP NAVBAR */
        .navbar {
            height: 70px;
            background-color: var(--bg-nav);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-sizing: border-box;
        }

        .nav-logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 24px;
            color: var(--accent-purple);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .badge-pro {
            background-color: var(--accent-purple);
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .search-container {
            position: relative;
            width: 400px;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box {
            width: 100%;
            padding: 10px 15px 10px 45px;
            background-color: #090e1a;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-main);
            font-size: 14px;
            box-sizing: border-box;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-purple);
        }

        .shortcut-hint {
            background-color: #111b2e;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .shortcut-hint span {
            color: #fbbf24;
            font-weight: bold;
        }

        /* MAIN BODY LAYOUT */
        .main-layout {
            display: flex;
            flex: 1;
            height: calc(100vh - 70px);
            overflow: hidden;
        }

        /* 2. LEFT SIDEBAR: CATEGORIES */
        .sidebar-left {
            width: 240px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 20px 10px;
            box-sizing: border-box;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 15px;
            padding-left: 10px;
            letter-spacing: 1px;
        }

        .category-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 6px;
            transition: all 0.2s;
            color: #94a3b8;
            font-weight: 500;
        }

        .category-item i {
            margin-right: 12px;
            width: 16px;
        }

        .category-item:hover, .category-item.active {
            background-color: var(--accent-purple);
            color: white;
        }

        .category-count {
            font-size: 11px;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            color: inherit;
        }

        /* 3. MIDDLE COLUMN: CHANNELS GRID */
        .middle-column {
            width: 420px;
            background-color: var(--bg-dark);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .middle-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .middle-header h3 {
            margin: 0;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .channel-grid-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .channel-grid-container::-webkit-scrollbar {
            width: 6px;
        }
        .channel-grid-container::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .channel-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .channel-card:hover, .channel-card.active {
            border-color: var(--accent-purple);
            background-color: #1e2d4a;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.2);
        }

        .logo-box {
            width: 45px;
            height: 45px;
            background-color: #0b1324;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 2px;
        }

        .ch-details {
            overflow: hidden;
            flex-grow: 1;
        }

        .ch-num {
            font-size: 10px;
            color: var(--accent-purple);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .ch-title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0;
        }

        .play-icon-hint {
            font-size: 10px;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .channel-card:hover .play-icon-hint, .channel-card.active .play-icon-hint {
            opacity: 1;
            color: var(--accent-purple);
        }

        /* 4. RIGHT COLUMN: BIG VIDEO PLAYER */
        .player-column {
            flex: 1;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            padding: 30px 0;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar-left { display: none; }
        }
        @media (max-width: 768px) {
            .main-layout { flex-direction: column-reverse; }
            .middle-column { width: 100%; height: 50vh; }
            .player-column { height: 40vh; flex: none; }
        }
    </style>
</head>

        { number: "24", name: "&TV (1080p)", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLRAXh5Fkd5YeGHnH5cinl9oJkZYD6rSAcog&s", group: "Entertainment", url: "https://amg01117-amg01117c1-amgplt0165.playout.now3.amagi.tv/playlist.m3u8" },
        { number: "25", name: "SONY KAL HINDI", logo: "https://upload.wikimedia.org/wikipedia/hi/6/6e/Sony_Kal_Logo.jpeg", group: "Entertainment", url: "https://spt-sonykal-1-us.lg.wurl.tv/playlist.m3u8" },
        { number: "26", name: "9xm", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQogiI0ZhtYbSjXstxsTfj9b18B71Qhn8WlsUxvhya48ARy8ZVJNNrR7sNCPxjRgJBQIo17LDP_gQca-iryfA3R6B2cB64WQLmE3-ASmSOtiA", group: "Music", url: "https://d35j504z0x2vu2.cloudfront.net/v1/master/0bc8e8376bd8417a1b6761138aa41c26c7309312/9xm/master.m3u8" },
        { number: "27", name: "Music India", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVv4W8vUZYWP-CbojHbEgJzST2qclgnq6V06LV6BVvALbQiRlJUDb1PLoL&s=10", group: "Music", url: "https://cdn-2.pishow.tv/live/226/master.m3u8" }
    ];

    const player = videojs('iptv-player');
    const channelContainer = document.getElementById('channelContainer');
    const categoryContainer = document.getElementById('categoryContainer');
    const searchBar = document.getElementById('searchBar');
    
    let currentCategory = 'All';

    // ১. ক্যাটাগরি মেনু তৈরি ও কাউন্ট লোড করার ফাংশন
    function renderCategories() {
        const counts = { All: channels.length };
        channels.forEach(ch => {
            counts[ch.group] = (counts[ch.group] || 0) + 1;
        });

        const categories = [
            { id: 'All', name: 'All', icon: 'fa-list-ul' },
            { id: 'Kids', name: 'Kids', icon: 'fa-child' },
            { id: 'News', name: 'News', icon: 'fa-newspaper' },
            { id: 'Movies', name: 'Movies', icon: 'fa-film' },
            { id: 'Music', name: 'Music', icon: 'fa-music' },
            { id: 'Entertainment', name: 'Entertainment', icon: 'fa-tv' }
        ];

        categoryContainer.innerHTML = '';
        categories.forEach(cat => {
            if(counts[cat.id] || cat.id === 'All') {
                const div = document.createElement('div');
                div.className = `category-item ${currentCategory === cat.id ? 'active' : ''}`;
                div.onclick = () => selectCategory(cat.id);
                div.innerHTML = `
                    <div><i class="fa-solid ${cat.icon}"></i> ${cat.name}</div>
                    <span class="category-count">${counts[cat.id] || 0}</span>
                `;
                categoryContainer.appendChild(div);
            }
        });
    }

    // ২. ক্যাটাগরি সিলেক্ট করা
    function selectCategory(catId) {
        currentCategory = catId;
        document.getElementById('currentCategoryTitle').innerHTML = `<i class="fa-solid fa-layer-group"></i> ${catId} Channels`;
        renderCategories();
        filterChannels();
    }

    // ৩. চ্যানেল ফিল্টার এবং রেন্ডার (সার্চ ও ক্যাটাগরি একসাথে ট্র্যাক করবে)
    function filterChannels() {
        const searchTxt = searchBar.value.toLowerCase().trim();
        
        const filtered = channels.filter(ch => {
            const matchesCategory = (currentCategory === 'All' || ch.group === currentCategory);
            const matchesSearch = (ch.name.toLowerCase().includes(searchTxt) || 
                                   ch.number.toString() === searchTxt || 
                                   ch.group.toLowerCase().includes(searchTxt));
            return matchesCategory && matchesSearch;
        });

        document.getElementById('currentCategoryCount').innerText = filtered.length;
        renderGrid(filtered);
    }

    // ৪. মিডল কলামে চ্যানেল গ্রিড জেনারেট করা
    function renderGrid(list) {
        channelContainer.innerHTML = '';
        if(list.length === 0) {
            channelContainer.innerHTML = `<div class="no-results">No channels found</div>`;
            return;
        }

        list.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.id = `card-${ch.number}`;
            card.onclick = () => playChannel(ch.url, ch.number);

            card.innerHTML = `
                <div class="logo-box">
                    <img src="${ch.logo}" alt="" onerror="this.src='https://via.placeholder.com/45x45/0b1324/fff?text=TV'">
                </div>
                <div class="ch-details">
                    <div class="ch-num">CH ${ch.number}</div>
                    <div class="ch-title">${ch.name}</div>
                </div>
                <i class="fa-solid fa-play play-icon-hint"></i>
            `;
            channelContainer.appendChild(card);
        });
    }

    // ৫. ভিডিও প্লে করার ফাংশন
    function playChannel(url, num) {
        document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
        const activeCard = document.getElementById(`card-${num}`);
        if(activeCard) activeCard.classList.add('active');

        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play().catch(err => console.log("CORS/Stream Link Error: Cannot play"));
    }

    // সার্চবারের ইভেন্ট লিসেনার
    searchBar.addEventListener('input', filterChannels);

    // কিবোর্ড শর্টকাট (১ থেকে ৯ চাপলে ১-৯ নম্বর চ্যানেল ডিরেক্ট প্লে হবে)
    window.addEventListener('keydown', (e) => {
        if (document.activeElement === searchBar) return; // সার্চবারে টাইপ করার সময় শর্টকাট অফ থাকবে
        if (e.key >= '1' && e.key <= '9') {
            const targetChannel = channels.find(ch => ch.number === e.key);
            if (targetChannel) playChannel(targetChannel.url, targetChannel.number);
        }
    });

    // প্রথমবার সাইট চালু হওয়ার সময় ইনিশিয়াল লোড
    renderCategories();
    filterChannels();
    
    // ডিফল্ট প্রথম চ্যানেলটি প্লেয়ারে একটিভ দেখাবে
    setTimeout(() => {
        const firstCard = document.getElementById('card-1');
        if(firstCard) firstCard.classList.add('active');
    }, 600);
</script>

</body>
</html>

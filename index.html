<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Web Player</title>
    <!-- Video.js CSS for smooth streaming -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            margin-bottom: 25px;
        }

        /* Player Section */
        .player-wrapper {
            margin-bottom: 30px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .video-js {
            width: 100%;
            aspect-ratio: 16/9;
        }

        /* Search & Filter Section */
        .search-box {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            background-color: var(--card-bg);
            border: 2px solid #334155;
            border-radius: 8px;
            color: var(--text-color);
            box-sizing: border-box;
            margin-bottom: 25px;
            transition: border-color 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* Playlist Grid */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .channel-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #334155;
        }

        .channel-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border-color: var(--accent-color);
        }

        .channel-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--accent-color);
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .channel-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin: 15px auto 10px;
            background: #0f172a;
            border-radius: 8px;
            padding: 5px;
        }

        .channel-name {
            font-size: 16px;
            font-weight: 600;
            margin: 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-group {
            font-size: 12px;
            color: var(--text-muted);
            background: #0f172a;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            padding: 4px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>IPTV Web Player</h1>

    <!-- Video Player -->
    <div class="player-wrapper">
        <video id="iptv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
            <source src="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" type="application/x-mpegURL">
            আপনার ব্রাউজারটি এই ভিডিও প্লেয়ার সাপোর্ট করে না।
        </video>
    </div>

    <!-- Smart Search Bar -->
    <input type="text" id="searchBar" class="search-box" placeholder="চ্যানেলের নাম, নম্বর অথবা গ্রুপ লিখে সার্চ করুন...">

    <!-- Channel Grid -->
    <div class="channel-grid" id="channelContainer">
        <!-- JavaScript এর মাধ্যমে চ্যানেলগুলো এখানে লোড হবে -->
    </div>
</div>

<!-- Video.js Scripts -->
<script src="https://vjs.zencdn.net/7.20.3/video.js"></script>

<script>
    // ডেমো চ্যানেল ডেটা (এখানে আপনার নিজের m3u8 লিংক বসাতে পারবেন)
    const channels = [
        {
            number: "1",
            name: "Somoy TV",
            logo: "https://via.placeholder.com/80x80/0f172a/fff?text=Somoy",
            group: "News",
            url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
        },
        {
            number: "2",
            name: "Jamuna TV",
            logo: "https://via.placeholder.com/80x80/0f172a/fff?text=Jamuna",
            group: "News",
            url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
        },
        {
            number: "3",
            name: "Sony Sports 1",
            logo: "https://via.placeholder.com/80x80/0f172a/fff?text=Sony",
            group: "Sports",
            url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
        },
        {
            number: "4",
            name: "HBO HD",
            logo: "https://via.placeholder.com/80x80/0f172a/fff?text=HBO",
            group: "Movies",
            url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
        },
        {
            number: "5",
            name: "Discovery Channel",
            logo: "https://via.placeholder.com/80x80/0f172a/fff?text=Discovery",
            group: "Infotainment",
            url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
        }
    ];

    // Initialize Video.js Player
    const player = videojs('iptv-player');

    const channelContainer = document.getElementById('channelContainer');
    const searchBar = document.getElementById('searchBar');

    // চ্যানেল কার্ড তৈরি ও রেন্ডার করার ফাংশন
    function displayChannels(channelList) {
        channelContainer.innerHTML = "";
        
        if (channelList.length === 0) {
            channelContainer.innerHTML = `<div class="no-results">কোনো চ্যানেল খুঁজে পাওয়া যায়নি!</div>`;
            return;
        }

        channelList.forEach(channel => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.onclick = () => playChannel(channel.url);

            card.innerHTML = `
                <div class="channel-number">#${channel.number}</div>
                <img class="channel-logo" src="${channel.logo}" alt="${channel.name}" onerror="this.src='https://via.placeholder.com/80x80/0f172a/fff?text=No+Logo'">
                <div class="channel-name">${channel.name}</div>
                <div class="channel-group">${channel.group}</div>
            `;
            channelContainer.appendChild(card);
        });
    }

    // চ্যানেল প্লে করার ফাংশন
    function playChannel(url) {
        player.src({
            src: url,
            type: 'application/x-mpegURL'
        });
        player.play();
        window.scrollTo({ top: 0, behavior: 'smooth' }); // প্লেয়ারের কাছে স্ক্রোল করবে
    }

    // অল-ইন-ওয়ান সার্চ ফাংশন (নাম, নম্বর এবং গ্রুপ)
    searchBar.addEventListener('input', (e) => {
        const searchTxt = e.target.value.toLowerCase().trim();
        
        const filtered = channels.filter(channel => {
            return channel.name.toLowerCase().includes(searchTxt) || 
                   channel.number.toString() === searchTxt || 
                   channel.group.toLowerCase().includes(searchTxt);
        });
        
        displayChannels(filtered);
    });

    // অ্যাপ চালুর সময় প্রথমবার সব চ্যানেল লোড করা
    displayChannels(channels);
</script>

</body>
</html>

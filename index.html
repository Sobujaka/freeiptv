<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jahangir IPTV Multi-Player Pro</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #0b0f19;
            --sidebar-bg: #111827;
            --card-bg: #1f2937;
            --accent-color: #2563eb;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header */
        header {
            background-color: var(--sidebar-bg);
            padding: 10px 20px;
            border-bottom: 1px solid #374151;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            box-sizing: border-box;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            color: #60a5fa;
            font-weight: 600;
        }

        /* App Container (Side-by-Side Always) */
        .app-container {
            display: flex;
            flex-direction: row; 
            flex: 1;
            height: calc(100vh - 50px);
            overflow: hidden;
            width: 100%;
        }

        /* Left Side: Video Player (70%) */
        .player-side {
            flex: 7; 
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
        }

        .video-wrapper {
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        .video-js {
            width: 100%;
            height: 100%;
        }

        .current-title {
            margin-top: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-color);
        }

        /* Right Side: Sidebar (30%) */
        .sidebar-side {
            flex: 3; 
            background-color: var(--sidebar-bg);
            border-left: 1px solid #374151;
            display: flex;
            flex-direction: column;
            min-width: 280px;
            height: 100%;
        }

        /* Search area */
        .search-container {
            padding: 12px;
            border-bottom: 1px solid #374151;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: rgba(0, 0, 0, 0.2);
        }

        .search-container input, .search-container select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #4b5563;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 13px;
            outline: none;
            box-sizing: border-box;
        }

        .search-container input:focus, .search-container select:focus {
            border-color: var(--accent-color);
        }

        /* Scrollable Channel List */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .channel-list::-webkit-scrollbar {
            width: 5px;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background-color: #4b5563;
            border-radius: 4px;
        }

        /* Channel Card Row */
        .channel-row {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .channel-row:hover {
            background-color: #374151;
            border-color: var(--accent-color);
        }

        .channel-row.active {
            background-color: rgba(37, 99, 235, 0.25);
            border-color: var(--accent-color);
        }

        .ch-num {
            font-size: 11px;
            color: var(--text-muted);
            min-width: 25px;
            font-weight: bold;
        }

        /* Fixed Image Container to stop Shaking/Kapa */
        .ch-logo-wrapper {
            width: 40px;
            height: 40px;
            min-width: 40px; 
            min-height: 40px;
            margin-right: 10px;
            background-color: #111827;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ch-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            backface-visibility: hidden;
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }

        .ch-details {
            flex: 1;
            overflow: hidden;
        }

        .ch-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ch-group {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 1px;
        }
    </style>
</head>
<body>

            { id: 29, name: "Music India", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVv4W8vUZYWP-CbojHbEgJzST2qclgnq6V06LV6BVvALbQiRlJUDb1PLoL&s=10", url: "https://cdn-2.pishow.tv/live/226/master.m3u8", group: "Music" }
        ];

        let currentActiveId = null;

        // VHS Custom Buffer Engine to stop stuttering / image loading issues
        const player = videojs('iptv-player', {
            fluid: true,
            controls: true,
            preload: 'auto',
            html5: {
                vhs: {
                    overrideNative: true,
                    maxBufferLength: 30,       
                    liveSyncDurationCount: 4,  
                    smoothQualityChange: true, 
                    enableLowInitialPlaylist: true
                }
            }
        });

        const channelListContainer = document.getElementById('channelListContainer');
        const searchBar = document.getElementById('searchBar');
        const groupFilter = document.getElementById('groupFilter');
        const currentPlayingText = document.getElementById('currentPlaying');
        const totalChSpan = document.getElementById('totalCh');

        function renderChannels(list) {
            channelListContainer.innerHTML = "";
            totalChSpan.innerText = list.length;

            if(list.length === 0) {
                channelListContainer.innerHTML = `<p style="text-align:center; padding: 20px; color:var(--text-muted); font-size:13px;">No item found!</p>`;
                return;
            }

            list.forEach(channel => {
                const row = document.createElement('div');
                row.className = `channel-row ${channel.id === currentActiveId ? 'active' : ''}`;
                row.id = `ch-${channel.id}`;
                row.onclick = () => playChannel(channel);

                row.innerHTML = `
                    <div class="ch-num">#${channel.id}</div>
                    <div class="ch-logo-wrapper">
                        <img class="ch-logo" src="${channel.logo}" alt="" onerror="this.src='https://placehold.co/70x70/1e293b/fff?text=TV'">
                    </div>
                    <div class="ch-details">
                        <div class="ch-name">${channel.name}</div>
                        <div class="ch-group">${channel.group}</div>
                    </div>
                `;
                channelListContainer.appendChild(row);
            });
        }

        // DYNAMIC FORMAT/TYPE DETECTOR FUNCTION
        function getVideoType(url) {
            const cleanUrl = url.split('?')[0].toLowerCase();
            
            if (cleanUrl.endsWith('.m3u8') || cleanUrl.includes('playlist.m3u8')) {
                return 'application/x-mpegURL'; // HLS Streams
            } else if (cleanUrl.endsWith('.mp4')) {
                return 'video/mp4';              // MP4 Videos
            } else if (cleanUrl.endsWith('.webm')) {
                return 'video/webm';             // WebM Formats
            } else if (cleanUrl.endsWith('.ogg')) {
                return 'video/ogg';              // Ogg Formats
            } else if (cleanUrl.endsWith('.mpd')) {
                return 'application/dash+xml';   // MPEG-DASH Support
            } else {
                return 'application/x-mpegURL';  // Default Dynamic Fallback
            }
        }

        function playChannel(channel) {
            currentActiveId = channel.id;
            document.querySelectorAll('.channel-row').forEach(r => r.classList.remove('active'));
            const activeRow = document.getElementById(`ch-${channel.id}`);
            if(activeRow) activeRow.classList.add('active');

            // Find video extension type and supply to source handler
            const videoType = getVideoType(channel.url);

            player.src({ src: channel.url, type: videoType });
            player.play().catch(() => console.log("Video tracking stream synchronized."));

            currentPlayingText.innerText = `Ekhon Cholche: #${channel.id} - ${channel.name}`;
        }

        function filterChannels() {
            const query = searchBar.value.toLowerCase().trim();
            const selectedGroup = groupFilter.value;

            const filtered = channels.filter(ch => {
                const matchName = ch.name.toLowerCase().includes(query);
                const matchNumber = ch.id.toString() === query; 
                
                const matchesSearch = matchName || matchNumber;
                const matchesGroup = selectedGroup === 'all' || ch.group === selectedGroup;
                
                return matchesSearch && matchesGroup;
            });
            renderChannels(filtered);
        }

        searchBar.addEventListener('input', filterChannels);
        groupFilter.addEventListener('change', filterChannels);

        // Run application
        renderChannels(channels);
        if(channels.length > 0) playChannel(channels[0]);
    </script>

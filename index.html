<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced IPTV Player</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Video.js for handling HLS (.m3u8) streams -->
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Top Navbar -->
    <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-tv text-indigo-500 text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wide text-white">Jahangir <span class="text-indigo-400">IPTV</span></h1>
        </div>
        <div class="w-full max-w-md mx-4">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchBar" placeholder="Search channels by name or number..." class="w-full bg-slate-850 border border-slate-700 rounded-full pl-10 pr-4 py-2 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Sidebar: Groups/Categories -->
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0">
            <div class="p-4 border-b border-slate-800">
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Categories</h2>
            </div>
            <div id="groupList" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                <!-- Groups will be injected here via JavaScript -->
            </div>
        </aside>

        <!-- Center: Video Player & Channel Grid -->
        <main class="flex-1 flex flex-col md:flex-row overflow-hidden bg-slate-950">
            
            <!-- Channel Content (Left/Top side inside main) -->
            <div class="flex-1 flex flex-col overflow-hidden border-r border-slate-800 p-4">
                <div class="flex items-center justify-between mb-4">
                    <h2 id="currentCategoryTitle" class="text-lg font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-layer-group text-indigo-400"></i> All Channels
                    </h2>
                    <span id="channelCount" class="text-xs bg-slate-800 text-slate-300 px-2.5 py-1 rounded-full border border-slate-700">0 Channels</span>
                </div>
                
                <!-- Channels Grid Container -->
                <div id="channelsGrid" class="flex-1 overflow-y-auto custom-scrollbar grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 content-start pb-6">
                    <!-- Channels will be injected here via JavaScript -->
                </div>
            </div>

            <!-- Right Side: Sticky Video Player Box -->
            <section class="w-full md:w-96 bg-slate-900 border-t md:border-t-0 border-slate-800 flex flex-col shrink-0">
                <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                    <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Now Playing</h3>
                    <div id="playerStatus" class="flex items-center gap-1.5 text-xs text-emerald-400 bg-emerald-950/50 px-2 py-0.5 rounded-full border border-emerald-800">
                        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> Live
                    </div>
                </div>
                
                <!-- Video.js Player Container -->
                <div class="bg-black aspect-video md:aspect-auto md:flex-1 relative flex items-center justify-center">
                    <div id="playerPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 p-4 text-center bg-slate-900 z-10">
                        <i class="fa-solid fa-play-circle text-5xl mb-2 text-indigo-500/40"></i>
                        <p class="text-sm">Select a channel to start streaming</p>
                    </div>
                    <video id="iptv-player" class="video-js vjs-default-skin w-full h-full" controls preload="auto" data-setup='{}'></video>
                </div>

                <!-- Active Channel Info Footer -->
                <div id="activeChannelInfo" class="p-4 bg-slate-900/50 border-t border-slate-800 hidden">
                    <div class="flex items-center gap-3">
                        <img id="activeLogo" src="" alt="" class="w-10 h-10 object-contain bg-slate-800 p-1 rounded border border-slate-700">
                        <div>
                            <div class="text-xs font-mono text-indigo-400" id="activeNumber">Ch --</div>
                            <h4 class="font-bold text-white text-sm" id="activeName">No Channel Selected</h4>
                        </div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script>
        // --- 1. Your Custom Channel Database ---
        // আপনি এখানে আপনার চ্যানেলের নাম, লগো, গ্রুপ এবং নাম্বার পরিবর্তন করতে পারবেন।
        const channels = [
            { id: 1, number: "101", name: "Somoy TV", group: "News", logo: "https://www.somoynews.tv/themes/somoy/images/logo.png", url: "https://example.com/live/somoy.m3u8" },
            { id: 2, number: "102", name: "Independent TV", group: "News", logo: "https://upload.wikimedia.org/wikipedia/en/2/2c/Independent_Television_logo.png", url: "https://example.com/live/independent.m3u8" },
            { id: 3, number: "201", name: "Sony Sports 1", group: "Sports", logo: "https://upload.wikimedia.org/wikipedia/commons/2/23/Sony_Sports_Network_logo.png", url: "https://example.com/live/sonysports1.m3u8" },
            { id: 4, number: "202", name: "T Sports", group: "Sports", logo: "https://upload.wikimedia.org/wikipedia/en/e/ed/TSports_logo.png", url: "https://example.com/live/tsports.m3u8" },
            { id: 5, number: "301", name: "Cartoon Network", group: "Kids", logo: "https://upload.wikimedia.org/wikipedia/commons/b/bb/Cartoon_Network_2010_logo.svg", url: "https://vodzong.mjunoon.tv:8087/streamtest/cartoon-network-87/playlist.m3u8" },
            { id: 6, number: "401", name: "HBO HD", group: "Movies", logo: "https://upload.wikimedia.org/wikipedia/commons/d/de/HBO_logo.svg", url: "https://example.com/live/hbo.m3u8" }
        ];

        let selectedCategory = "All";
        let searchQuery = "";
        let player;

        // Initialize Player & App
        document.addEventListener('DOMContentLoaded', () => {
            player = videojs('iptv-player');
            renderGroups();
            renderChannels();

            // Search event listener
            document.getElementById('searchBar').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderChannels();
            });
        });

        // Render Sidebar Category/Groups
        function renderGroups() {
            const groupList = document.getElementById('groupList');
            const groups = ['All', ...new Set(channels.map(ch => ch.group))];
            
            groupList.innerHTML = groups.map(group => {
                const isActive = selectedCategory === group;
                const icon = group === 'All' ? 'fa-list' : group === 'News' ? 'fa-newspaper' : group === 'Sports' ? 'fa-trophy' : group === 'Kids' ? 'fa-child' : 'fa-film';
                
                return `
                    <button onclick="filterCategory('${group}')" class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 text-left ${isActive ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid ${icon} w-4 text-center"></i>
                            <span>${group}</span>
                        </div>
                        <span class="text-xs px-1.5 py-0.5 rounded bg-slate-950/40 text-slate-400">${group === 'All' ? channels.length : channels.filter(c => c.group === group).length}</span>
                    </button>
                `;
            }).join('');
        }

        // Change Active Category
        function filterCategory(category) {
            selectedCategory = category;
            document.getElementById('currentCategoryTitle').innerHTML = `<i class="fa-solid fa-layer-group text-indigo-400"></i> ${category} Channels`;
            renderGroups();
            renderChannels();
        }

        // Render Channels Grid
        function renderChannels() {
            const grid = document.getElementById('channelsGrid');
            
            // Filter Logic
            const filteredChannels = channels.filter(channel => {
                const matchesCategory = selectedCategory === 'All' || channel.group === selectedCategory;
                const matchesSearch = channel.name.toLowerCase().includes(searchQuery) || channel.number.includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            document.getElementById('channelCount').innerText = `${filteredChannels.length} Channels`;

            if(filteredChannels.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-slate-500"><i class="fa-solid fa-folder-open text-4xl mb-2 block"></i> No channels found</div>`;
                return;
            }

            grid.innerHTML = filteredChannels.map(channel => `
                <div onclick="playChannel(${channel.id})" class="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col items-center justify-between text-center cursor-pointer hover:border-indigo-500/50 hover:bg-slate-850 transition-all duration-200 group relative overflow-hidden">
                    <span class="absolute top-2 left-2 text-[10px] font-mono bg-slate-950 text-indigo-400 px-1.5 py-0.5 rounded border border-slate-800">Ch ${channel.number}</span>
                    <div class="w-16 h-16 flex items-center justify-center my-3">
                        <img src="${channel.logo}" alt="${channel.name}" onerror="this.src='https://placehold.co/100x100/1e293b/cbd5e1?text=TV'" class="max-w-full max-h-full object-contain filter drop-shadow group-hover:scale-105 transition-transform">
                    </div>
                    <div class="w-full">
                        <div class="text-xs text-slate-500 font-medium truncate mb-0.5">${channel.group}</div>
                        <h3 class="text-sm font-bold text-slate-200 group-hover:text-indigo-400 transition-colors truncate">${channel.name}</h3>
                    </div>
                </div>
            `).join('');
        }

        // Play Selected Channel Stream
        function playChannel(id) {
            const channel = channels.find(c => c.id === id);
            if(!channel) return;

            // Hide Placeholder
            document.getElementById('playerPlaceholder').classList.add('hidden');
            
            // Update Footer Info
            const footer = document.getElementById('activeChannelInfo');
            footer.classList.remove('hidden');
            document.getElementById('activeLogo').src = channel.logo;
            document.getElementById('activeNumber').innerText = `Ch ${channel.number}`;
            document.getElementById('activeName').innerText = channel.name;

            // Load Video Source in Video.js (Supports .m3u8 HLS Streams)
            player.src({
                src: channel.url,
                type: 'application/x-mpegURL'
            });
            player.play();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jahangir IPTV Ultimate Cinema Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0b0f19; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        /* Video Player Absolute Layout Fix */
        .video-js { font-family: sans-serif !important; color: #fff !important; width: 100% !important; height: 100% !important; }
        .video-js .vjs-big-play-button { background-color: #4f46e5 !important; border-radius: 50% !important; width: 2em !important; height: 2em !important; line-height: 2em !important; margin-top: -1em !important; margin-left: -1em !important; border: none !important; }
        .vjs-control-bar { background-color: rgba(15, 23, 42, 0.9) !important; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#05070f] text-slate-100 font-sans h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-[#0b0f19] border-b border-slate-900 px-6 py-3 flex items-center justify-between shrink-0 z-20 shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
            <h1 class="text-lg font-bold tracking-wider text-white">JAHANGIR <span class="text-indigo-400">IPTV CINEMA</span></h1>
        </div>

        <div class="flex items-center gap-4">
            <label class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-5 py-2.5 rounded-xl cursor-pointer transition-all flex items-center gap-2 shadow-lg shadow-indigo-600/20 active:scale-95">
                <i class="fa-solid fa-cloud-arrow-up text-sm"></i> Load M3U Playlist
                <input type="file" id="m3uFileSelector" accept=".m3u,.m3u8" class="hidden">
            </label>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <div class="w-64 lg:w-80 bg-[#0b0f19] border-r border-slate-900 flex flex-col shrink-0 z-10 overflow-hidden">
            <div class="p-3 bg-[#0d1321] border-b border-slate-900 space-y-2">
                <div class="flex justify-between items-center text-xs font-bold text-slate-400 uppercase tracking-wider px-1">
                    <span>Channels List</span>
                    <span id="counterBadge" class="bg-slate-950 text-indigo-400 px-2 py-0.5 rounded-md font-mono border border-slate-800">0</span>
                </div>
                <select id="categorySelector" onchange="filterChannelsByGroup(this.value)" class="w-full bg-[#05070f] border border-slate-800 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-indigo-500 hidden"></select>
            </div>

            <div id="channelsListView" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1 bg-[#05070f]">
                <div class="py-20 text-center text-slate-500 text-xs px-4 space-y-2">
                    <i class="fa-solid fa-tv text-3xl text-slate-800 block"></i>
                    <p>Click "Load M3U Playlist" button above to import your live TV channels.</p>
                </div>
            </div>
        </div>

        <main class="flex-1 bg-black flex flex-col relative justify-center items-center overflow-hidden">
            
            <div id="channelFlashAlert" class="absolute top-6 left-6 bg-slate-900/95 backdrop-blur border border-indigo-500/30 px-6 py-3 rounded-2xl flex items-center gap-4 z-30 opacity-0 pointer-events-none transition-all duration-300 shadow-2xl">
                <div class="text-3xl font-black font-mono text-indigo-400" id="flashChNum">00</div>
                <div class="h-8 w-[1px] bg-slate-800"></div>
                <div class="text-base font-bold text-white tracking-wide" id="flashChName">Loading...</div>
            </div>

            <div id="remoteTypingOverlay" class="absolute bg-indigo-600 border border-indigo-400 text-white font-mono font-black text-4xl px-8 py-4 rounded-2xl z-40 shadow-2xl transition-transform hidden">
                <span class="text-[10px] text-indigo-200 block font-sans font-bold tracking-widest uppercase mb-1">REMOTE INPUT</span>
                CH <span id="remoteLiveNumber" class="text-yellow-300"></span>
            </div>

            <div class="w-full h-full flex items-center justify-center relative bg-black">
                <div id="playerScreenIdler" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-6 text-center bg-gradient-to-b from-[#0b0f19] via-[#05070f] to-black z-10">
                    <i class="fa-solid fa-circle-play text-5xl text-indigo-500/20 mb-3 animate-pulse"></i>
                    <p class="text-sm font-bold text-slate-300">No Stream Active</p>
                    <p class="text-[11px] text-slate-600 mt-1 max-w-xs">Load a playlist file, select a channel, or type any multi-digit number directly on your keyboard.</p>
                </div>
                
                <video id="iptv-cinema-player" class="video-js vjs-default-skin w-full h-full object-contain" controls preload="auto"></video>
            </div>

        </main>
    </div>

    <script>
        let channelDatabase = [];
        let activeGroupFilter = "All";
        let activePlayingId = null;
        let vjsPlayerEngine;

        // Smart Buffer System variables for Multi-digits (12, 13, 104 etc.)
        let keyboardInputString = "";
        let keyboardInputTimer = null;

        document.addEventListener('DOMContentLoaded', () => {
            // Setup Big Canvas Player Engine
            vjsPlayerEngine = videojs('iptv-cinema-player', {
                html5: { vhs: { overrideNative: true } }
            });

            // Listener for Playlist file loader
            document.getElementById('m3uFileSelector').addEventListener('change', parseUploadedM3UFile);

            // ⌨️ FIX: MULTI-DIGIT KEYBOARD REMOTE CONTROL LISTENER
            document.addEventListener('keydown', (event) => {
                // Safeguard against form element errors
                if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;

                // Capture numerical hits (0 to 9)
                if (event.key >= '0' && event.key <= '9') {
                    clearTimeout(keyboardInputTimer);
                    keyboardInputString += event.key;

                    // Display typing panel directly over the center screen
                    const typingPanel = document.getElementById('remoteTypingOverlay');
                    document.getElementById('remoteLiveNumber').innerText = keyboardInputString;
                    typingPanel.classList.remove('hidden');

                    // 1.2 Seconds Timeout Window for sequential typing (e.g., '1' then '3' = 13)
                    keyboardInputTimer = setTimeout(() => {
                        processKeyboardChannelChange(keyboardInputString);
                        keyboardInputString = ""; // Reset buffer
                        typingPanel.classList.add('hidden');
                    }, 1200);
                }
            });
        });

        // Match typed multi-digit value inside current array index list
        function processKeyboardChannelChange(targetNumberString) {
            const parsedInteger = String(parseInt(targetNumberString, 10));
            const matchedChannelObj = channelDatabase.find(ch => String(ch.number) === parsedInteger);
            
            if (matchedChannelObj) {
                executeLiveStreamPlay(matchedChannelObj.id);
            } else {
                alert(`Channel number ${parsedInteger} is not inside this M3U file.`);
            }
        }

        // --- Core M3U Playlist Parser Implementation ---
        function parseUploadedM3UFile(event) {
            const fileObj = event.target.files[0];
            if (!fileObj) return;

            const fileReader = new FileReader();
            fileReader.onload = function(e) {
                const textContent = e.target.result;
                const linesArray = textContent.split('\n');
                
                channelDatabase = [];
                let currentItem = null;
                let autoChannelIndex = 1;

                for (let i = 0; i < linesArray.length; i++) {
                    let lineStr = linesArray[i].trim();

                    if (lineStr.startsWith('#EXTINF:')) {
                        currentItem = {};
                        currentItem.id = autoChannelIndex;
                        currentItem.number = String(autoChannelIndex); // Sequential layout mapping
                        
                        const logoExtraction = lineStr.match(/tvg-logo="([^"]+)"/);
                        const groupExtraction = lineStr.match(/group-title="([^"]+)"/);
                        
                        currentItem.logo = logoExtraction ? logoExtraction[1] : "";
                        currentItem.group = groupExtraction ? groupExtraction[1] : "General Channels";
                        
                        const lastCommaIdx = lineStr.lastIndexOf(',');
                        currentItem.name = lastCommaIdx !== -1 ? lineStr.substring(lastCommaIdx + 1).trim() : "Live Channel Stream";
                        
                    } else if (lineStr.startsWith('http') && currentItem) {
                        currentItem.url = lineStr;
                        channelDatabase.push(currentItem);
                        currentItem = null;
                        autoChannelIndex++;
                    }
                }

                activeGroupFilter = "All";
                buildCategoryFilterUI();
                renderChannelsListViewUI();
            };
            fileReader.readAsText(fileObj);
        }

        // Dynamic Dropdown Filter Selector Maker
        function buildCategoryFilterUI() {
            const selectElement = document.getElementById('categorySelector');
            if (channelDatabase.length === 0) {
                selectElement.classList.add('hidden');
                return;
            }

            selectElement.classList.remove('hidden');
            const uniqueGroupsArray = ['All', ...new Set(channelDatabase.map(ch => ch.group))];
            
            selectElement.innerHTML = uniqueGroupsArray.map(groupName => {
                const totalInGroup = groupName === 'All' ? channelDatabase.length : channelDatabase.filter(c => c.group === groupName).length;
                return `<option value="${groupName}">${groupName} (${totalInGroup})</option>`;
            }).join('');
        }

        function filterChannelsByGroup(selectedValue) {
            activeGroupFilter = selectedValue;
            renderChannelsListViewUI();
        }

        // Render Compact Sidebar Lists
        function renderChannelsListViewUI() {
            const listViewGrid = document.getElementById('channelsListView');
            const filteredArray = channelDatabase.filter(ch => activeGroupFilter === 'All' || ch.group === activeGroupFilter);

            document.getElementById('counterBadge').innerText = filteredArray.length;

            if (filteredArray.length === 0) {
                listViewGrid.innerHTML = `<div class="text-center py-8 text-slate-600 text-xs">No channels in group</div>`;
                return;
            }

            listViewGrid.innerHTML = filteredArray.map(ch => {
                const isActivePlayback = activePlayingId === ch.id;
                return `
                    <div onclick="executeLiveStreamPlay(${ch.id})" class="bg-[#0b0f19]/40 border ${isActivePlayback ? 'border-indigo-500 bg-[#0d1321]' : 'border-slate-900'} hover:border-indigo-500/60 rounded-xl p-2 flex items-center gap-3 cursor-pointer transition-all group">
                        <div class="w-8 h-8 bg-slate-950 rounded-lg p-1 flex items-center justify-center shrink-0 border border-slate-800">
                            <img src="${ch.logo}" alt="" onerror="this.src='https://placehold.co/80x80/05070f/cbd5e1?text=TV'" class="max-w-full max-h-full object-contain">
                        </div>
                        <div class="overflow-hidden flex-1">
                            <div class="text-[9px] font-mono font-bold text-indigo-400">CH ${ch.number}</div>
                            <h3 class="text-xs font-bold text-slate-300 truncate group-hover:text-white">${ch.name}</h3>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Active Player Stream Core Controller
        function executeLiveStreamPlay(uniqueTargetId) {
            const targetedChannelObj = channelDatabase.find(c => c.id === uniqueTargetId);
            if (!targetedChannelObj) return;

            activePlayingId = uniqueTargetId;
            document.getElementById('playerScreenIdler').classList.add('hidden');
            
            // Push source live URL into Video.js player engine pipeline
            vjsPlayerEngine.src({
                src: targetedChannelObj.url,
                type: 'application/x-mpegURL'
            });
            vjsPlayerEngine.play();
            renderChannelsListViewUI();

            // Flash Screen Header Alert Banner
            const alertBanner = document.getElementById('channelFlashAlert');
            document.getElementById('flashChNum').innerText = targetedChannelObj.number;
            document.getElementById('flashChName').innerText = targetedChannelObj.name;
            
            alertBanner.classList.remove('opacity-0', 'pointer-events-none');
            alertBanner.classList.add('opacity-100');
            
            setTimeout(() => {
                alertBanner.classList.remove('opacity-100');
                alertBanner.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jahangir IPTV HD Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Premium Player Theme override to block broken texts */
        .video-js { font-family: sans-serif !important; color: #fff !important; }
        .video-js .vjs-big-play-button { background-color: rgba(99, 102, 241, 0.8) !important; border-radius: 50% !important; width: 2.5em !important; height: 2.5em !important; line-height: 2.5em !important; margin-top: -1.25em !important; margin-left: -1.25em !important; border: none !important; }
        .video-js:hover .vjs-big-play-button { background-color: #4f46e5 !important; }
        .vjs-loading-spinner { border-radius: 50% !important; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center justify-between shrink-0 z-20">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-tv text-indigo-500 text-2xl animate-pulse"></i>
            <h1 class="text-xl font-bold tracking-wide text-white">Jahangir <span class="text-indigo-400">IPTV <span class="text-xs bg-indigo-900 text-indigo-300 px-2 py-0.5 rounded ml-1 border border-indigo-700">PRO HD</span></span></h1>
        </div>
        <div class="w-full max-w-md mx-4">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchBar" placeholder="Type name or channel number..." class="w-full bg-slate-950 border border-slate-700 rounded-full pl-10 pr-4 py-2 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors">
            </div>
        </div>
        <div class="hidden sm:flex items-center gap-2 text-xs text-slate-400 bg-slate-950 px-3 py-1.5 rounded-lg border border-slate-800">
            <i class="fa-solid fa-keyboard text-indigo-400"></i> Press <kbd class="bg-slate-800 px-1 rounded text-white font-mono">1-9</kbd> on Keyboard to Change Channel
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside class="w-56 bg-slate-900/90 border-r border-slate-800 flex flex-col shrink-0 z-10">
            <div class="p-4 border-b border-slate-800">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Categories</h2>
            </div>
            <div id="groupList" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                </div>
        </aside>

        <div class="w-[30%] min-w-[280px] hidden md:flex flex-col bg-slate-950 border-r border-slate-800 p-4 overflow-hidden z-10">
            <div class="flex items-center justify-between mb-4">
                <h2 id="currentCategoryTitle" class="text-sm font-bold text-slate-300 flex items-center gap-2 truncate">
                    <i class="fa-solid fa-layer-group text-indigo-400"></i> All Channels
                </h2>
                <span id="channelCount" class="text-[11px] bg-slate-900 text-indigo-300 px-2 py-0.5 rounded border border-indigo-950 font-mono">0</span>
            </div>
            
            <div id="channelsGrid" class="flex-1 overflow-y-auto custom-scrollbar grid grid-cols-1 xl:grid-cols-2 gap-2 content-start pb-4">
                </div>
        </div>

        <main class="flex-1 bg-black flex flex-col relative justify-center items-center overflow-hidden group/player">
            
            <div id="channelOverlay" class="absolute top-6 left-6 bg-slate-900/80 backdrop-blur border border-slate-700 px-4 py-2 rounded-xl flex items-center gap-3 z-30 opacity-0 pointer-events-none transition-opacity duration-300 shadow-2xl">
                <div class="text-xl font-black font-mono text-indigo-400" id="overlayNumber">01</div>
                <div class="h-6 w-[1px] bg-slate-700"></div>
                <div class="text-sm font-bold text-white" id="overlayName">Loading...</div>
            </div>

            <div class="w-full h-full flex items-center justify-center relative">
                <div id="playerPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-4 text-center bg-gradient-to-b from-slate-900 to-slate-950 z-10">
                    <div class="w-20 h-20 bg-indigo-600/10 border border-indigo-500/20 rounded-full flex items-center justify-center mb-4 shadow-xl shadow-indigo-500/5">
                        <i class="fa-solid fa-play text-3xl text-indigo-400 ml-1"></i>
                    </div>
                    <p class="text-base font-bold text-slate-200">Welcome to Jahangir IPTV</p>
                    <p class="text-xs text-slate-500 mt-1 max-w-xs">Select a channel from the left or press any number on your keyboard to instantly play HD stream.</p>
                </div>
                
                <video id="iptv-player" class="video-js vjs-default-skin w-full h-full object-contain" controls preload="auto" data-setup='{"fluid": false, "playbackRates": [1]}'>
                    <p class="vjs-no-js">To view this video please enable JavaScript.</p>
                </video>
            </div>

        </main>
    </div>

    <script>
        // --- High Quality IPTV Database ---
        const channels = [
            { 
                id: 1, 
                number: "1", 
                name: "Cartoon Network", 
                group: "Kids", 
                logo: "https://i.ibb.co.com/8B0Lpzd/1000021166.png", 
                url: "https://vodzong.mjunoon.tv:8087/streamtest/cartoon-network-87/playlist.m3u8" 
            },
            { 
                id: 2, 
                number: "2", 
                name: "Somoy TV", 
                group: "News", 
                logo: "https://www.somoynews.tv/themes/somoy/images/logo.png", 
                url: "https://example.com/live/somoy.m3u8" 
            },
            { 
                id: 3, 
                number: "3", 
                name: "Sony Sports 1", 
                group: "Sports", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/2/23/Sony_Sports_Network_logo.png", 
                url: "https://example.com/live/sonysports1.m3u8" 
            }
        ];

        let selectedCategory = "All";
        let searchQuery = "";
        let player;

        document.addEventListener('DOMContentLoaded', () => {
            // Initiate Video JS Player
            player = videojs('iptv-player', {
                html5: { vhs: { overrideNative: true }, nativeAudioTracks: false, nativeVideoTracks: false }
            });

            renderGroups();
            renderChannels();

            // Search Bar Execution
            document.getElementById('searchBar').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderChannels();
            });

            // ⌨️ Keyboard Remote Control Hotkeys (Press 1, 2, 3 etc.)
            document.addEventListener('keydown', (e) => {
                // Ignore keypress if typing inside input search bar
                if (document.activeElement.tagName === 'INPUT') return;

                const pressedKey = e.key;
                const foundChannel = channels.find(ch => ch.number === pressedKey);
                
                if (foundChannel) {
                    playChannel(foundChannel.id);
                }
            });
        });

        // Categories Builder
        function renderGroups() {
            const groupList = document.getElementById('groupList');
            const groups = ['All', ...new Set(channels.map(ch => ch.group))];
            
            groupList.innerHTML = groups.map(group => {
                const isActive = selectedCategory === group;
                const icon = group === 'All' ? 'fa-list' : group === 'News' ? 'fa-newspaper' : group === 'Sports' ? 'fa-trophy' : group === 'Kids' ? 'fa-child' : 'fa-film';
                
                return `
                    <button onclick="filterCategory('${group}')" class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-xs font-semibold transition-all duration-200 text-left ${isActive ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid ${icon} w-4 text-center text-sm"></i>
                            <span>${group}</span>
                        </div>
                        <span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-950/50 text-slate-400">${group === 'All' ? channels.length : channels.filter(c => c.group === group).length}</span>
                    </button>
                `;
            }).join('');
        }

        function filterCategory(category) {
            selectedCategory = category;
            document.getElementById('currentCategoryTitle').innerHTML = `<i class="fa-solid fa-layer-group text-indigo-400"></i> ${category} Channels`;
            renderGroups();
            renderChannels();
        }

        // Channels UI Render
        function renderChannels() {
            const grid = document.getElementById('channelsGrid');
            
            const filteredChannels = channels.filter(channel => {
                const matchesCategory = selectedCategory === 'All' || channel.group === selectedCategory;
                const matchesSearch = channel.name.toLowerCase().includes(searchQuery) || channel.number.includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            document.getElementById('channelCount').innerText = filteredChannels.length;

            if(filteredChannels.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-8 text-center text-slate-600 text-xs">No channels</div>`;
                return;
            }

            grid.innerHTML = filteredChannels.map(channel => `
                <div onclick="playChannel(${channel.id})" class="bg-slate-900 border border-slate-800/80 hover:border-indigo-500 rounded-xl p-2.5 flex items-center gap-3 cursor-pointer hover:bg-slate-850 transition-all duration-200 group">
                    <div class="w-10 h-10 bg-slate-950 rounded-lg p-1.5 flex items-center justify-center shrink-0 border border-slate-800">
                        <img src="${channel.logo}" alt="" onerror="this.src='https://placehold.co/80x80/1e293b/cbd5e1?text=TV'" class="max-w-full max-h-full object-contain">
                    </div>
                    <div class="overflow-hidden flex-1">
                        <div class="text-[10px] font-mono text-indigo-400 font-bold">CH ${channel.number}</div>
                        <h3 class="text-xs font-bold text-slate-200 truncate group-hover:text-white">${channel.name}</h3>
                    </div>
                    <i class="fa-solid fa-play text-[10px] text-slate-600 group-hover:text-indigo-400 transition-colors mr-1"></i>
                </div>
            `).join('');
        }

        // Core HD Stream Engine Processor
        function playChannel(id) {
            const channel = channels.find(c => c.id === id);
            if(!channel) return;

            // Trigger Video.js Engine Switch
            document.getElementById('playerPlaceholder').classList.add('hidden');
            
            player.src({
                src: channel.url,
                type: 'application/x-mpegURL'
            });
            
            player.ready(function() {
                this.play();
            });

            // Trigger Fullscreen Smart Notification Overlay
            const overlay = document.getElementById('channelOverlay');
            document.getElementById('overlayNumber').innerText = channel.number.padStart(2, '0');
            document.getElementById('overlayName').innerText = channel.name;
            
            overlay.classList.remove('opacity-0');
            overlay.classList.add('opacity-100');
            
            // Auto hide notification overlay after 3 seconds
            setTimeout(() => {
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>

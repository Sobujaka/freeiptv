<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার IPTV প্লেয়ার</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #11141a;
            color: #ffffff;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            color: #00ff88;
            font-size: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* প্লেয়ার সেকশন */
        .player-section {
            background-color: #1a1f29;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-container {
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        .video-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }

        .current-channel-info {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ff88;
        }

        /* চ্যানেল লিস্ট ও সার্চ সেকশন */
        .channel-section {
            background-color: #1a1f29;
            padding: 20px;
            border-radius: 12px;
        }

        .channel-header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 480px) {
            .channel-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .channel-section h2 {
            font-size: 1.4rem;
            border-left: 4px solid #00ff88;
            padding-left: 10px;
        }

        /* সার্চ বক্স স্টাইল */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 250px;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            background-color: #252d3d;
            border: 2px solid #333d4f;
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .search-input::placeholder {
            color: #8892b0;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-height: 550px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* স্ক্রোলবার কাস্টমাইজেশন */
        .channel-grid::-webkit-scrollbar {
            width: 6px;
        }
        .channel-grid::-webkit-scrollbar-thumb {
            background-color: #333d4f;
            border-radius: 4px;
        }

        /* চ্যানেলカード স্টাইল */
        .channel-card {
            background-color: #252d3d;
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .channel-card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
            background-color: #2c374b;
        }

        .channel-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: #00ff88;
            color: #11141a;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .channel-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin: 10px auto;
            display: block;
            background-color: #fff;
            border-radius: 8px;
            padding: 5px;
        }

        .channel-name {
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* নো রেজাল্ট মেসেজ */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 30px;
            color: #8892b0;
            font-size: 1rem;
        }

        /* রেসপনসিভ লেআউট (ডেস্কটপ স্ক্রিনের জন্য সাইড-বাই-সাইড) */
        @media (min-width: 992px) {
            .container {
                grid-template-columns: 60% 40%;
                align-items: start;
            }
            .channel-grid {
                max-height: 70vh;
            }
        }
    </style>
</head>

                    </p>
                </video>
            </div>
            <div class="current-channel-info" id="playing-now">
                চ্যানেল লোড হচ্ছে...
            </div>
        </div>

        <div class="channel-section">
            <div class="channel-header">
                <h2>চ্যানেল সমূহ</h2>

                </div>
            </div>
            <div class="channel-grid" id="channel-list"></div>
        </div>

    </div>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার অটোমেটিক IP TV প্লেয়ার</title>
    <!-- HLS.js for Live Streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        h1 {
            margin: 10px 0;
            font-size: 24px;
            color: #00ec47;
            background: none;
        }

        /* ভিডিও প্লেয়ার সেকশন (ওপরে থাকবে) */
        .player-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            background: #000;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        video {
            width: 100%;
            height: 100%;
            background: #000;
        }

        /* চ্যানেল গ্রিড সেকশন (নিচে থাকবে - প্রতি লাইনে ৫টি) */
        .channel-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            padding: 10px 0;
            background: none;
        }

        /* অটোমেটিক তৈরি হওয়া চ্যানেল কার্ডের স্টাইল */
        .channel-card {
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .channel-card:hover {
            background: #00ec47;
            border-color: #00ec47;
            transform: translateY(-3px);
        }
        
        .channel-card:hover p {
            color: #000;
        }

        .channel-card img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            background: transparent;
            margin-bottom: 8px;
        }

        .channel-card p {
            font-size: 12px;
            font-weight: bold;
            background: none;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        #loading {
            font-size: 18px;
            color: #ffb300;
            margin-top: 20px;
            background: none;
        }

        /* মোবাইল রেসপনসিভ (মোবাইলে প্রতি লাইনে ৩টি দেখাবে) */
        @media (max-width: 600px) {
            .channel-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            h1 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <h1>আমার লাইভ আইপি টিভি</h1>

    <!-- ১. ভিডিও প্লেয়ার (ওপরে) -->
    <div class="player-container">
        <video id="video-player" controls autoplay poster="https://via.placeholder.com/800x450?text=Select+a+Channel"></video>
    </div>

    <!-- লোডিং মেসেজ -->
    <div id="loading">চ্যানেল লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</div>

    <!-- ২. চ্যানেল লিস্ট (নিচে - এখানে অটোমেটিক তৈরি হবে) -->
    <div class="channel-container" id="channel-list"></div>

    <script>
        // 🛠️ আপনার দেওয়া M3U লিংকটি এখানে সেট করা হয়েছে
        const m3uUrl = 'https://raw.githubusercontent.com/Sobujaka/m3u-player/refs/heads/main/remaining_channels.m3u'; 

        // M3U ফাইলটি রিড করার ফাংশন
        async function fetchM3U() {
            try {
                const response = await fetch(m3uUrl);
                if (!response.ok) throw new Error('Network error');
                const text = await response.text();
                parseM3U(text);
            } catch (error) {
                document.getElementById('loading').innerText = "চ্যানেল লোড করতে সমস্যা হয়েছে! লিংকটি চেক করুন বা CORS সমস্যা হতে পারে।";
                console.error(error);
            }
        }

        // M3U টেক্সট থেকে চ্যানেল আলাদা করার লজিক
        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    // চ্যানেলের নাম বের করা
                    const nameMatch = line.split(',')[1];
                    currentChannel.name = nameMatch ? nameMatch.trim() : "Unknown Channel";

                    // লোগো বা আইকন বের করা
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : "https://via.placeholder.com/50?text=TV";
                } 
                else if (line.startsWith('http')) {
                    // চ্যানেলের স্ট্রিম লিংক
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {}; // নতুন চ্যানেলের জন্য খালি করা
                }
            }

            displayChannels(channels);
        }

        // স্ক্রিনে ৫টি করে চ্যানেল সাজানো
        function displayChannels(channels) {
            const container = document.getElementById('channel-list');
            document.getElementById('loading').style.display = 'none'; // লোডিং বন্ধ করা

            if(channels.length === 0) {
                document.getElementById('loading').innerText = "কোনো চ্যানেল পাওয়া যায়নি।";
                document.getElementById('loading').style.display = 'block';
                return;
            }

            channels.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                // ক্লিকে প্লে হবে
                card.onclick = () => playStream(channel.url);

                card.innerHTML = `
                    <img src="${channel.logo}" onerror="this.src='https://via.placeholder.com/50?text=TV'">
                    <p>${channel.name}</p>
                `;
                container.appendChild(card);
            });
        }

        // ভিডিও প্লে করার ফাংশন
        function playStream(url) {
            const video = document.getElementById('video-player');
            
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            } else {
                alert("আপনার ব্রাউজারে এই লিংকটি সাপোর্ট করছে না।");
            }
        }

        // পেজ লোড হলেই M3U থেকে ডাটা আনা শুরু হবে
        fetchM3U();
    </script>

</body>
</html>
